<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TahfidzQu</title>
  
  <!-- LOAD FONT ARABIC (AMIRI) PERMANEN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style type="text/tailwindcss">
    @layer components {
      .input-std { @apply w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm text-slate-800 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 shadow-inner dark:bg-[#0a120f] dark:border-[#1a2e26] dark:text-white transition-colors; }
      .btn-std { @apply w-full py-3 bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition shadow-md dark:text-black dark:hover:bg-emerald-400 active:scale-95 disabled:opacity-50; }
      .modal-overlay { @apply fixed inset-0 bg-slate-900/70 flex items-center justify-center z-[200] backdrop-blur-sm p-4; }
      .modal-box { @apply bg-white border border-slate-200 rounded-[2rem] w-full max-w-[450px] p-8 shadow-2xl dark:bg-[#15241e] dark:border-[#1a2e26] transition-colors max-h-[90vh] overflow-y-auto; }
      .card-std { @apply bg-white border border-slate-200 shadow-sm dark:bg-[#15241e] dark:border-[#1a2e26] rounded-2xl p-5 hover:border-emerald-400 hover:shadow-md dark:hover:border-emerald-500/50 transition-all cursor-pointer flex flex-col h-full relative overflow-hidden; }
      .tab-active { @apply bg-emerald-500 text-white dark:text-black shadow-lg shadow-emerald-500/20 border border-emerald-500 px-6 py-2.5 rounded-full font-bold transition-all shrink-0 flex items-center gap-2; }
      .tab-inactive { @apply bg-white border border-slate-200 text-slate-500 hover:text-emerald-600 hover:bg-slate-50 dark:bg-[#15241e] dark:border-[#1a2e26] dark:text-gray-400 dark:hover:text-white px-6 py-2.5 rounded-full font-bold transition-all shadow-sm shrink-0 flex items-center gap-2; }
    }
  </style>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #1a2e26; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    /* FONT ARAB TETAP KONSISTEN */
    .font-arabic { font-family: 'Amiri', serif !important; line-height: 2.8 !important; direction: rtl; text-align: right; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#111c18] dark:text-gray-200 font-sans flex flex-col w-full h-screen overflow-hidden transition-colors duration-300">

  <!-- WRAPPER VIDEO PERMANEN -->
  <div id="persistent-player-wrapper" class="hidden">
      <div id="youtube-player" class="w-full h-full"></div>
  </div>

  <div id="app-root" class="flex flex-col w-full h-full relative z-10"></div>
  <div id="modal-root" class="relative z-[300]"></div>

  <script>
    // --- STATE UTAMA ---
    window.App = {
      theme: localStorage.getItem('tahfidzqu_theme') || 'light',
      adminLvl: 0, view: 'home', search: '', schLogo: localStorage.getItem('tahfidzqu_logo') || '',
      schSub: localStorage.getItem('tahfidzqu_subtitle') || 'Madrasah Tahfidz Quran',
      customDialog: { show: false, type: 'alert', message: '', onConfirm: null },
      juzs: [], surahs: [], levels: [], segs: [], ustadz: [], halaqohs: [], siswas: [], subs: [],
      actJuzId: 1, actSurahId: null, actSegId: null,
      yt: null, isPlay: false, repTarget: 7, curRep: 0, speed: 1, modal: null, modalData: null,
      filter: {u:'all', h:'all', s:'all'}, hierSel: {u:null, h:null, s:null}, rec: {is:false, secs:0, int:null, src:'player'}
    };

    // --- HELPER ---
    window.esc = s => s ? String(s).replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t])) : '';
    window.getEl = id => document.getElementById(id);
    window.val = (id, v) => { var e = window.getEl(id); if(!e) return ''; if(v !== undefined) e.value = v; return e.value; };
    window.text = (id, t) => { var e = window.getEl(id); if(e) e.innerText = t; };

    window.getLvl = () => {
        let lvls = window.App.levels.filter(l => l.surahId == window.App.actSurahId);
        let activeLvl = lvls.find(l => l.active);
        return activeLvl ? activeLvl.id : (lvls.length > 0 ? lvls[0].id : null);
    };
    window.getSgs = () => window.App.segs.filter(s => s.surahId == window.App.actSurahId && s.levelId == window.getLvl()).sort((a,b) => a.start - b.start);
    window.getActSeg = () => { var s = window.getSgs(); return s.find(x => x.id == window.App.actSegId) || s[0] || null; };

    // --- NAVIGASI & KONTROL VIDEO ---
    window.switchView = function(vt) {
        if(window.App.view === 'player' && vt !== 'player') {
            if(window.App.yt && typeof window.App.yt.pauseVideo === 'function') {
                window.App.yt.pauseVideo(); window.App.isPlay = false;
            }
        }
        window.App.view = vt; window.App.search = '';
        window.render(true);
    };

    window.toggleYTPlay = function() {
        if(window.App.yt && typeof window.App.yt.playVideo === 'function') {
            if(window.App.isPlay) window.App.yt.pauseVideo();
            else {
                let cSg = window.getActSeg(); let t = window.App.yt.getCurrentTime();
                if(t < (cSg?.start||0) || t >= (cSg?.end||100)) { window.App.yt.seekTo(cSg?.start||0); window.App.curRep = 0; }
                window.App.yt.playVideo();
            }
        }
    };

    window.selectSeg = function(id) {
        window.App.actSegId = id; window.App.curRep = 0;
        let sg = window.App.segs.find(x => x.id == id);
        if(!sg) return;
        if(window.App.yt && typeof window.App.yt.seekTo === 'function') {
            window.App.yt.seekTo(sg.start); window.App.yt.playVideo(); window.App.isPlay = true;
        }
        window.updatePlayerDOM();
    };

    window.openSurah = function(surahId) {
        window.App.actSurahId = surahId; window.App.actSegId = null;
        if(!window.App.levels.some(l => l.surahId == surahId)){
            let nid = Date.now(); window.dbSave('levels', nid, {id:nid, surahId:surahId, name:'Level 1', active:true});
        }
        window.switchView('player');
    };

    window.initYTPlayer = function() {
        if(!window.YT || !window.YT.Player) return;
        var sur = window.App.surahs.find(s=>s.id == window.App.actSurahId);
        window.App.yt = new window.YT.Player('youtube-player', {
            host: 'https://www.youtube-nocookie.com', videoId: sur?.videoId||'', 
            playerVars: { controls:0, disablekb:1, rel:0, modestbranding:1, playsinline:1 },
            events: {
                onReady: e => e.target.setPlaybackRate(window.App.speed),
                onStateChange: e => { window.App.isPlay = (e.data === YT.PlayerState.PLAYING); }
            }
        });
    };

    // --- ENGINE RENDER ---
    window.render = function() {
        let isForced = arguments[0] === true;
        document.documentElement.classList.toggle('dark', window.App.theme==='dark');
        let pWrap = document.getElementById('persistent-player-wrapper');
        
        if (window.App.view === 'player' && pWrap && pWrap.parentNode.id === 'player-destination' && !isForced && !window.App.modal) {
            window.updatePlayerDOM();
        } else {
            if(pWrap) { pWrap.classList.add('hidden'); document.body.appendChild(pWrap); }
            document.getElementById('app-root').innerHTML = window.generateMainHtml();
            if(window.App.view === 'player') {
                let pDest = document.getElementById('player-destination');
                if (pWrap && pDest) {
                    pWrap.classList.remove('hidden'); pWrap.classList.add('absolute', 'inset-0', 'z-0');
                    pDest.appendChild(pWrap);
                    if(!window.App.yt) window.initYTPlayer();
                }
                window.updatePlayerDOM();
            }
        }
        window.renderModal();
    };

    window.generateMainHtml = function() {
        const isAdmin = window.App.adminLvl > 0;
        const pend = window.App.subs.filter(s=>s.status==='pending').length;
        let html = `
        <header class="shrink-0 border-b border-slate-200 dark:border-[#1a2e26] bg-white dark:bg-[#0a120f] z-50">
          <div class="flex items-center justify-between px-4 md:px-8 py-3 md:py-4">
             <div class="flex items-center gap-3 text-emerald-500 font-bold cursor-pointer" onclick="window.switchView('home')">
                ${window.App.schLogo ? `<img src="${window.App.schLogo}" class="h-8 md:h-10 max-w-[150px] object-contain">` : `<i class="ph-fill ph-monitor-play text-3xl"></i>`}
                <div class="flex flex-col"><span class="text-lg md:text-xl leading-none">TahfidzQu</span>${window.App.schSub?`<span class="text-[9px] text-slate-500 uppercase mt-1 tracking-widest">${window.App.schSub}</span>`:''}</div>
             </div>
             <div class="flex items-center gap-2">
                <button onclick="window.App.theme=window.App.theme==='dark'?'light':'dark';window.render(true)" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-[#15241e] text-slate-500 flex items-center justify-center"><i class="ph-fill ${window.App.theme==='dark'?'ph-sun':'ph-moon'}"></i></button>
                ${isAdmin ? `<button onclick="window.App.adminLvl=0;window.switchView('home');" class="w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center"><i class="ph-bold ph-sign-out"></i></button>` : `<button onclick="window.App.modal='login';window.render()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-[#15241e] text-slate-500 flex items-center justify-center"><i class="ph-fill ph-lock-key"></i></button>`}
             </div>
          </div>
          <div class="px-4 md:px-8 border-t border-slate-100 dark:border-[#1a2e26] flex gap-6 text-sm font-bold pt-3 md:pt-0 overflow-x-auto hide-scrollbar">
             <button onclick="window.switchView('home')" class="${window.App.view==='home'?'text-emerald-600 border-b-2 border-emerald-500':'text-slate-500'} pb-2 transition flex items-center gap-1.5 whitespace-nowrap"><i class="ph-bold ph-house"></i> Beranda</button>
             <button onclick="window.switchView('hub')" class="${window.App.view==='hub'?'text-emerald-600 border-b-2 border-emerald-500':'text-slate-500'} pb-2 transition flex items-center gap-1.5 whitespace-nowrap"><i class="ph-bold ph-clipboard-text"></i> Setoran Hub</button>
             ${isAdmin ? `
               <button onclick="window.switchView('admin')" class="${window.App.view==='admin'?'text-orange-600 border-b-2 border-orange-500':'text-slate-500'} pb-2 flex items-center gap-1.5 whitespace-nowrap"><i class="ph-bold ph-tray"></i> Setoran Masuk ${pend>0?`<span class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">${pend}</span>`:''}</button>
               <button onclick="window.switchView('master')" class="${window.App.view==='master'?'text-purple-600 border-b-2 border-purple-500':'text-slate-500'} pb-2 flex items-center gap-1.5 whitespace-nowrap"><i class="ph-bold ph-database"></i> Data Master</button>
             ` : ''}
          </div>
        </header>
        <div class="flex-1 overflow-hidden flex flex-col w-full relative bg-slate-50 dark:bg-[#111c18]">`;

        if(window.App.view === 'home') {
            html += `<div class="flex-1 overflow-y-auto p-4 md:p-8"><div class="max-w-6xl mx-auto"><h1 class="text-2xl md:text-3xl font-serif dark:text-white mb-1 flex items-center gap-2"><i class="ph-fill ph-books text-emerald-500"></i> Pilih Surah</h1><p class="text-xs md:text-sm text-slate-500 mb-8">Pilih materi hafalan dari daftar surah yang tersedia.</p><div class="flex gap-2 overflow-x-auto hide-scrollbar mb-8 border-b dark:border-[#1a2e26] pb-4">${window.App.juzs.map(j=>`<button onclick="window.App.actJuzId=${j.id};window.render(true)" class="${j.id===window.App.actJuzId?'tab-active':'tab-inactive'}">${window.esc(j.name)}</button>`).join('')}</div><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">${window.App.surahs.filter(s=>s.juzId==window.App.actJuzId).map(s=>`<div class="card-std" onclick="window.openSurah(${s.id})"><div class="w-12 h-12 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center mb-4"><i class="ph-fill ph-book-open text-2xl"></i></div><h3 class="font-bold dark:text-white">${window.esc(s.title)}</h3><p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-widest">${window.App.segs.filter(x=>x.surahId==s.id).length} Ayat</p></div>`).join('')}</div></div></div>`;
        } else if(window.App.view === 'player') {
            html += `<div class="flex flex-col lg:flex-row w-full h-full overflow-hidden"><div class="w-full lg:w-64 border-r dark:border-[#1a2e26] p-4 flex flex-row lg:flex-col shrink-0 gap-3 overflow-x-auto hide-scrollbar" id="levels-box"></div><div class="flex-1 p-4 lg:p-8 overflow-y-auto"><div class="max-w-4xl mx-auto"><div id="player-destination" class="relative rounded-3xl overflow-hidden bg-black aspect-video mb-6 shadow-xl"><div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none"><button id="big-play-btn" onclick="window.toggleYTPlay()" class="w-20 h-20 rounded-full bg-emerald-500 text-white pointer-events-auto shadow-2xl transition-all"><i class="ph-fill ph-play text-4xl"></i></button></div><div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4 lg:p-6 z-20 pointer-events-none"><div id="progress-box" class="h-1.5 bg-gray-700/50 rounded-full overflow-hidden flex relative mb-4"></div><div class="flex justify-between items-center text-white text-xs font-mono pointer-events-auto"><div class="flex gap-6 items-center"><button onclick="window.nextSeg(-1)"><i class="ph-fill ph-skip-back text-xl"></i></button><button id="play-pause-btn" onclick="window.toggleYTPlay()"><i class="ph-fill ph-play text-3xl"></i></button><button onclick="window.nextSeg(1)"><i class="ph-fill ph-skip-forward text-xl"></i></button></div><div id="time-display">00:00 / 00:00</div></div></div></div><div class="grid grid-cols-2 gap-4 mb-8"><div class="card-std !p-4"><span class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest">LOOP</span><div class="flex justify-between items-center font-bold text-lg dark:text-white"><span id="rep-target-val">${window.App.repTarget}x</span><div class="flex gap-1"><button onclick="window.updateRepTarget(-1)" class="w-8 h-8 rounded bg-slate-100 dark:bg-black">-</button><button onclick="window.updateRepTarget(1)" class="w-8 h-8 rounded bg-slate-100 dark:bg-black">+</button></div></div></div><div class="card-std !p-4"><span class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest">SPEED</span><div class="flex justify-between items-center font-bold text-lg dark:text-white"><span id="speed-val">${window.App.speed}x</span><div class="flex gap-1"><button onclick="window.updateSpeed(-0.25)" class="w-8 h-8 rounded bg-slate-100 dark:bg-black">▼</button><button onclick="window.updateSpeed(0.25)" class="w-8 h-8 rounded bg-slate-100 dark:bg-black">▲</button></div></div></div></div><div class="card-std !p-8 hidden" id="quran-box"><h3 id="quran-title" class="text-emerald-600 font-bold text-xs border-b pb-2 mb-6 uppercase tracking-widest"></h3><p id="quran-arabic" class="font-arabic text-4xl dark:text-white mb-8"></p><p id="quran-trans" class="text-sm text-slate-500 dark:text-gray-400 italic border-l-4 border-emerald-500 pl-4"></p></div></div></div><div class="w-full lg:w-80 border-t lg:border-t-0 lg:border-l dark:border-[#1a2e26] p-4 overflow-y-auto shrink-0" id="segs-box"></div></div>`;
        } else if (window.App.view === 'hub') {
            html += `<div class="flex-1 overflow-y-auto p-4 md:p-8"><div class="max-w-6xl mx-auto"><h1 class="text-2xl font-serif dark:text-white mb-1 flex items-center gap-2"><i class="ph-fill ph-clipboard-text text-emerald-500"></i> Papan Riwayat</h1><p class="text-xs md:text-sm text-slate-500 mb-8">Pantau status hafalan dan progres santri secara real-time.</p><div class="grid grid-cols-1 md:grid-cols-3 gap-6">${window.App.subs.sort((a,b)=>b.id-a.id).map(s=>`<div class="card-std shadow-md"><h3 class="font-bold text-slate-800 dark:text-white">${window.esc(window.App.siswas.find(x=>x.id==s.siswaId)?.name||'-')}</h3><p class="text-xs text-emerald-600 font-bold mb-4 uppercase">${window.App.surahs.find(x=>x.id==s.surahId)?.title || '-'}</p><audio controls class="w-full h-8 mb-4" src="${s.audioUrl}"></audio><div class="text-[10px] font-bold uppercase ${s.status==='graded'?'text-emerald-500':'text-orange-500'}"><i class="ph-bold ${s.status==='graded'?'ph-check-circle':'ph-hourglass'}"></i> ${s.status==='graded'?'Lulus':'Menunggu'}</div></div>`).join('')}</div></div></div>`;
        } else if (window.App.view === 'admin') {
            html += `<div class="flex-1 overflow-y-auto p-4 md:p-8"><div class="max-w-6xl mx-auto"><h1 class="text-2xl font-serif text-orange-600 mb-1 flex items-center gap-2"><i class="ph-fill ph-tray text-orange-500"></i> Antrean Setoran</h1><p class="text-xs md:text-sm text-slate-500 mb-8">Daftar rekaman hafalan yang menunggu penilaian ustadz.</p><div class="bg-white dark:bg-[#15241e] border dark:border-[#1a2e26] rounded-3xl overflow-hidden divide-y">${window.App.subs.filter(s=>s.status==='pending').map(sb=>`<div class="p-6 flex flex-col md:flex-row justify-between items-center gap-6"><div><p class="font-bold text-lg dark:text-white">${window.getSName(sb.siswaId)}</p><p class="text-xs text-slate-500 uppercase">${window.getHName(sb.halaqohId)}</p></div><audio controls class="h-9 w-full md:w-64" src="${sb.audioUrl}"></audio><button onclick="window.App.modal='grade';window.App.modalData=${sb.id};window.render(true)" class="p-3 bg-blue-600 text-white rounded-2xl shadow-xl"><i class="ph-fill ph-star"></i></button></div>`).join('')}</div></div></div>`;
        } else if (window.App.view === 'master') {
            html += `<div class="flex-1 overflow-y-auto p-4 md:p-8"><div class="max-w-7xl mx-auto"><h1 class="text-2xl font-serif text-purple-600 mb-1 flex items-center gap-2"><i class="ph-fill ph-database text-purple-500"></i> Manajemen Data Master</h1><p class="text-xs md:text-sm text-slate-500 mb-8">Atur data ustadz, kelompok halaqoh, dan santri Madrasah.</p><div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="card-std !p-0"><div class="p-4 bg-purple-50 dark:bg-purple-900/20 border-b dark:border-[#1a2e26] font-bold flex justify-between">Ustadz/ah <button onclick="let nid=Date.now();window.dbSave('ustadz',nid,{id:nid,name:'Ustadz Baru',username:'user'+nid,password:'pass'});window.render(true)" class="text-purple-600"><i class="ph-bold ph-plus"></i></button></div><div class="p-3 space-y-2">${window.App.ustadz.map(u=>`<div class="p-3 bg-slate-50 dark:bg-black rounded-xl text-sm flex justify-between"><span>${window.esc(u.name)}</span><button onclick="window.confirmDelete('ustadz', ${u.id})" class="text-red-300"><i class="ph-fill ph-trash"></i></button></div>`).join('')}</div></div><div class="card-std !p-0"><div class="p-4 bg-blue-50 dark:bg-blue-900/20 border-b dark:border-[#1a2e26] font-bold">Halaqoh</div><div class="p-3 space-y-2">${window.App.halaqohs.map(h=>`<div class="p-3 bg-slate-50 dark:bg-black rounded-xl text-sm">${window.esc(h.name)}</div>`).join('')}</div></div><div class="card-std !p-0"><div class="p-4 bg-emerald-50 dark:bg-emerald-900/20 border-b dark:border-[#1a2e26] font-bold">Santri</div><div class="p-3 space-y-2">${window.App.siswas.map(s=>`<div class="p-3 bg-slate-50 dark:bg-black rounded-xl text-sm">${window.esc(s.name)}</div>`).join('')}</div></div></div></div></div>`;
        }
        
        return html + `</div><footer class="shrink-0 py-3 text-center text-[10px] md:text-xs text-slate-400 border-t border-slate-200 dark:border-[#1a2e26]">Copyright &copy; 2026 Juman Jayyidin</footer>`;
    };

    window.updatePlayerDOM = function() {
        const isAdmin = window.App.adminLvl > 0;
        const ml = window.App.levels.filter(l=>l.surahId == window.App.actSurahId);
        let allSgs = window.getSgs(); const cSg = window.getActSeg();
        const td = allSgs.length ? allSgs[allSgs.length-1].end : 1;
        let lb = document.getElementById('levels-box');
        if (lb) lb.innerHTML = ml.map((l,i)=>`<button onclick="window.App.levels.forEach(x=>{if(x.surahId==${window.App.actSurahId}){x.active=(x.id==${l.id});window.dbSave('levels',x.id,x);}});window.render(true)" class="flex items-center gap-3 p-3 rounded-xl shrink-0 transition ${l.active?'bg-emerald-500 text-white shadow-lg':'bg-slate-50 dark:bg-[#15241e]'}"><div class="w-6 h-6 rounded flex items-center justify-center text-xs font-bold ${l.active?'bg-white/20':'bg-white text-slate-500'}">${i+1}</div><span class="text-sm font-bold truncate">${window.esc(l.name)}</span></button>`).join('') + (isAdmin?`<button onclick="window.App.modal='level';window.render(true)" class="p-3 rounded-xl border border-dashed border-slate-300 text-emerald-600 font-bold text-sm shrink-0 flex items-center justify-center gap-2"><i class="ph-bold ph-plus"></i> Baru</button>`:'');
        let sb = document.getElementById('segs-box');
        if (sb) sb.innerHTML = `<div><h2 class="font-bold dark:text-white mb-4 flex justify-between items-center"><span class="flex items-center gap-2"><i class="ph-fill ph-list-numbers text-emerald-500"></i> Daftar Ayat</span> ${isAdmin?`<button onclick="window.App.modal='segment';window.render(true)" class="text-[10px] bg-emerald-100 px-2 py-1 rounded-lg text-emerald-600 font-bold flex items-center gap-1 hover:bg-emerald-500 hover:text-white transition"><i class="ph-bold ph-plus"></i> Baru</button>`:''}</h2>` + (allSgs.map(s=>`<div onclick="window.selectSeg(${s.id})" class="p-4 rounded-2xl border cursor-pointer mb-3 transition shadow-sm ${s.id===(cSg?.id)?'bg-emerald-50 border-emerald-300 dark:bg-[#152b22]':'bg-white border-transparent'}"><h4 class="font-bold ${s.id===(cSg?.id)?'text-emerald-800 dark:text-white':'text-slate-700'}">${window.esc(s.title)}</h4><p class="text-[10px] text-slate-400 font-mono mt-1">${window.fmtT(s.start)} - ${window.fmtT(s.end)}</p></div>`).join('') || '<p class="text-xs text-slate-400 italic">Belum ada ayat.</p>') + `</div>`;
        let pb = document.getElementById('progress-box');
        if (pb) pb.innerHTML = allSgs.map(s=>`<div class="absolute h-full border-r border-black/20 ${s.id===(cSg?.id)?'bg-emerald-500':'bg-gray-400 opacity-30'}" style="left:${(s.start/td)*100}%; width:${((s.end-s.start)/td)*100}%"></div>`).join('');
        if (cSg) { window.show('quran-box'); window.text('quran-title', cSg.title); document.getElementById('quran-arabic').innerText = cSg.arabic; window.text('quran-trans', cSg.translation); } 
        else window.hide('quran-box');
    };

    window.renderModal = function() {
        let root = document.getElementById('modal-root');
        if(!window.App.modal) { root.innerHTML = ''; return; }
        let mHtml = '';
        if(window.App.modal==='login') {
            mHtml += `<div class="modal-overlay !flex"><div class="modal-box text-center"><h2 class="text-xl font-bold mb-4 dark:text-white">Akses Admin</h2><input type="text" id="m_u" class="input-std mb-3 text-center" placeholder="Username"><input type="password" id="m_p" class="input-std mb-4 text-center" placeholder="Password"><button onclick="window.handleAdminLogin()" class="btn-std mb-2">Login</button><button onclick="window.App.modal=null;window.render()" class="w-full py-3 text-slate-500">Batal</button></div></div>`;
        } else if (window.App.modal==='level') {
            mHtml += `<div class="modal-overlay !flex"><div class="modal-box"><h2 class="text-xl font-bold mb-6 dark:text-white">Tambah Level</h2><form onsubmit="event.preventDefault();let nid=Date.now();window.dbSave('levels',nid,{id:nid,surahId:${window.App.actSurahId},name:window.val('m_v'),active:false});window.App.modal=null;window.render(true)"><input type="text" id="m_v" required class="input-std mb-6" placeholder="Contoh: Level 2..."><button type="submit" class="btn-std">Simpan</button></form></div></div>`;
        } else if (window.App.modal==='segment') {
            mHtml += `<div class="modal-overlay !flex"><div class="modal-box !max-w-xl"><h2 class="text-xl font-bold mb-4 dark:text-white">Tambah Ayat</h2><form onsubmit="event.preventDefault();let id=Date.now();let sm=parseInt(window.val('sm')||0),ss=parseInt(window.val('ss')||0),em=parseInt(window.val('em')||0),es=parseInt(window.val('es')||0);window.dbSave('segs',id,{id:id,surahId:${window.App.actSurahId},levelId:${window.getLvl()},title:window.val('st'),start:sm*60+ss,end:em*60+es,arabic:window.val('sa'),translation:window.val('str')});window.App.modal=null;window.render(true)"><input id="st" placeholder="Ayat 1" required class="input-std mb-3"><textarea id="sa" placeholder="Teks Arab" rows="3" class="input-std font-arabic mb-3"></textarea><textarea id="str" placeholder="Terjemahan" rows="2" class="input-std mb-3"></textarea><div class="grid grid-cols-2 gap-4 mb-6"><div><label class="text-xs font-bold">Mulai (M:D)</label><div class="flex gap-2"><input id="sm" type="number" value="0" class="input-std"><input id="ss" type="number" value="0" class="input-std"></div></div><div><label class="text-xs font-bold">Selesai (M:D)</label><div class="flex gap-2"><input id="em" type="number" value="0" class="input-std"><input id="es" type="number" value="0" class="input-std"></div></div></div><button type="submit" class="btn-std">Simpan</button></form></div></div>`;
        }
        root.innerHTML = mHtml;
    };

    window.handleAdminLogin = function() {
        const u = document.getElementById('m_u').value.trim();
        const p = document.getElementById('m_p').value.trim();
        if(u === 'jayyidin' && p === 'offthewallba123') { window.App.adminLvl = 1; window.App.modal = null; window.switchView('admin'); }
        else { window.App.loginError = 'Gagal Login!'; window.render(); }
    };

    window.initYTPlayer = function() {
        if(!window.YT || !window.YT.Player) return;
        var sur = window.App.surahs.find(s=>s.id == window.App.actSurahId);
        window.App.yt = new window.YT.Player('youtube-player', {
            host: 'https://www.youtube-nocookie.com', videoId: sur?.videoId||'', 
            playerVars: { controls:0, disablekb:1, rel:0, modestbranding:1, playsinline:1 },
            events: {
                onReady: e => e.target.setPlaybackRate(window.App.speed),
                onStateChange: e => { window.App.isPlay = (e.data === YT.PlayerState.PLAYING); }
            }
        });
    };
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const fbConf = {
        apiKey: "AIzaSyCdfYQeAiBMfAPsBGuzS7qWIoi_u3CaSvE", authDomain: "tahfidzqu-7c937.firebaseapp.com",
        projectId: "tahfidzqu-7c937", storageBucket: "tahfidzqu-7c937.firebasestorage.app",
        messagingSenderId: "596320735782", appId: "1:596320735782:web:340387094ff61f31fecce7",
        databaseURL: "https://tahfidzqu-7c937-default-rtdb.asia-southeast1.firebasedatabase.app/" 
    };

    const safeId = (typeof __app_id !== 'undefined' ? __app_id : 'tahfidzqu-v2').replace(/[.#$\[\]]/g, '_');
    const fApp = initializeApp(fbConf);
    const auth = getAuth(fApp);
    const db = getDatabase(fApp);
    let fbUser = null;

    window.dbSave = async (col, id, data) => { if(fbUser) await set(ref(db, `artifacts/${safeId}/public/data/${col}/${id}`), data); };
    window.dbDelete = async (col, id) => { if(fbUser) await remove(ref(db, `artifacts/${safeId}/public/data/${col}/${id}`)); };

    window.render(true);

    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
        } catch (e) { await signInAnonymously(auth); }
    };
    initAuth();

    onAuthStateChanged(auth, u => {
       fbUser = u; if(!u) return;
       ['juzs','surahs','levels','segs','ustadz','halaqohs','siswas','subs'].forEach(c => {
          onValue(ref(db, `artifacts/${safeId}/public/data/${c}`), snap => {
             const obj = snap.val();
             window.App[c] = obj ? Object.keys(obj).map(k => ({id: isNaN(k) ? k : Number(k), ...obj[k]})) : [];
             window.render();
          });
       });
       setInterval(() => {
          if (window.App.view === 'player' && window.App.isPlay && window.App.yt?.getCurrentTime && window.App.actSurahId) {
             var t = window.App.yt.getCurrentTime(); var sg = window.getActSeg(); if(!sg) return;
             if(window.getEl('time-display')) window.getEl('time-display').innerText = `${window.fmtT(t)} / ${window.fmtT(sg.end)}`;
             var td = window.getSgs().slice(-1)[0]?.end || 200;
             if(window.getEl('current-time-indicator')) window.getEl('current-time-indicator').style.left = `${Math.min(100, (t/td)*100)}%`;
             if (t >= sg.end) {
                if (window.App.curRep + 1 < window.App.repTarget) { window.App.yt.seekTo(sg.start); window.App.curRep++; if(window.getEl('rep-text')) window.getEl('rep-text').innerText = `(Ke-${window.App.curRep+1})`; }
                else { window.App.yt.pauseVideo(); window.App.isPlay = false; window.App.curRep = 0; if(window.getEl('rep-text')) window.getEl('rep-text').innerText = ''; }
             }
          }
       }, 200);
    });
  </script>
