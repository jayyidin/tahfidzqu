    window.esc = function(str) {
        if (!str) return '';
        return String(str).replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
    };

    window.getEl = function(id) { return document.getElementById(id); };
    window.hide = function(id) { var e = window.getEl(id); if(e) e.classList.add('hidden'); };
    window.show = function(id) { var e = window.getEl(id); if(e) e.classList.remove('hidden'); };
    window.val = function(id, v) { var e = window.getEl(id); if(!e) return ''; if(v !== undefined) e.value = v; return e.value; };

    window.fixAudio = function(el) {
        if (el.dataset.fixed === "true") return;
        let doFix = function() {
            if (el.dataset.fixed === "true") return;
            el.dataset.fixed = "true"; 
            let m = el.muted;
            el.muted = true; 
            let onSeeked = function() {
                el.removeEventListener('seeked', onSeeked);
                el.currentTime = 0; 
                setTimeout(() => { el.muted = m; }, 50); 
            };
            el.addEventListener('seeked', onSeeked);
            el.currentTime = 1e8; 
        };
        el.addEventListener('play', doFix);
        if (el.readyState >= 1) { doFix(); }
    };

    window.simulateScreenshot = function() {
        let f = document.createElement('div');
        f.style.position = 'fixed';
        f.style.top = '0'; f.style.left = '0';
        f.style.width = '100vw'; f.style.height = '100vh';
        f.style.backgroundColor = '#ffffff';
        f.style.zIndex = '999999';
        f.style.opacity = '0.9';
        f.style.transition = 'opacity 0.4s ease-out';
        document.body.appendChild(f);
        
        try {
            let a = new Audio('https://actions.google.com/sounds/v1/ui/camera_shutter.ogg');
            a.volume = 0.5;
            a.play().catch(e=>{});
        } catch(err){}

        setTimeout(() => { f.style.opacity = '0'; }, 50);
        setTimeout(() => { if(f.parentNode) f.parentNode.removeChild(f); }, 500);
    };

    window.downloadCard = function() {
        let node = document.getElementById('achievement-card-node');
        let btn = document.getElementById('btn-download-card');
        if(!node || !window.modernScreenshot) return;
        
        let oldHtml = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i> Menyimpan...';
        btn.disabled = true;

        window.simulateScreenshot();

        document.fonts.ready.then(() => {
            setTimeout(() => {
                modernScreenshot.domToPng(node, { scale: 3, backgroundColor: null })
                .then(function (dataUrl) {
                    let link = document.createElement('a');
                    link.download = 'Syahadah_TahfidzQu.png';
                    link.href = dataUrl;
                    link.click();
                    btn.innerHTML = oldHtml;
                    btn.disabled = false;
                })
                .catch(function (error) {
                    window.showAlert('Gagal screenshot kartu. ' + error);
                    btn.innerHTML = oldHtml;
                    btn.disabled = false;
                });
            }, 300);
        });
    };

    window.shareCard = function() {
        let node = document.getElementById('achievement-card-node');
        let btn = document.getElementById('btn-share-card');
        if(!node || !window.modernScreenshot) return;

        let oldHtml = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i> Memproses...';
        btn.disabled = true;

        window.simulateScreenshot();

        document.fonts.ready.then(() => {
            setTimeout(() => {
                modernScreenshot.domToPng(node, { scale: 3, backgroundColor: null })
                .then(async function (dataUrl) {
                    try {
                        let blob = await (await fetch(dataUrl)).blob();
                        let file = new File([blob], 'Syahadah_TahfidzQu.png', { type: 'image/png' });

                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({
                                title: 'Syahadah Tahfidz',
                                text: 'Alhamdulillah, pencapaian hafalan baru!',
                                files: [file]
                            });
                        } else {
                            window.showAlert('Perangkat ini tidak mendukung fitur Share gambar langsung. Silakan Download gambarnya terlebih dahulu.');
                        }
                    } catch (e) {
                        if (e && e.name !== 'AbortError') {
                            window.showAlert('Gagal membagikan kartu. Coba gunakan fitur Download.');
                        }
                    }
                    btn.innerHTML = oldHtml;
                    btn.disabled = false;
                })
                .catch(function (error) {
                    window.showAlert('Gagal memproses kartu. ' + error);
                    btn.innerHTML = oldHtml;
                    btn.disabled = false;
                });
            }, 300);
        });
    };

    window.fmtT = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    if (!window.App.audioObj) {
        window.App.audioObj = new Audio();
        
        window.App.audioObj.addEventListener('timeupdate', () => {
            let id = window.App.activeAudioId;
            if(!id) return;
            
            let elTime = window.getEl('audio-time-' + id);
            let elBar = window.getEl('audio-bar-' + id);
            let a = window.App.audioObj;
            
            let ct = a.currentTime;
            if (!ct || isNaN(ct)) ct = 0;
            
            if(elTime) elTime.innerText = window.fmtT(ct); 
            
            if(elBar) {
                let d = window.App.activeAudioDur || a.duration;
                if (!d || isNaN(d) || d === Infinity || d <= 0) d = Math.max(10, ct + 2);
                let pct = Math.min(100, (ct / d) * 100);
                elBar.style.width = pct + '%';
            }
        });
        
        window.App.audioObj.addEventListener('ended', () => {
            let id = window.App.activeAudioId;
            if(!id) return;
            let isUstadz = id.includes('_ust_') || id === 'grade_modal';
            let btn = window.getEl('audio-btn-' + id);
            let elBar = window.getEl('audio-bar-' + id);
            let elTime = window.getEl('audio-time-' + id);
            if(btn) btn.innerHTML = '<i class="ph-fill ph-play ' + (isUstadz ? 'text-xs' : 'text-sm') + '"></i>';
            if(elBar) elBar.style.width = '0%';
            if(elTime) elTime.innerText = '00:00';
            window.App.activeAudioId = null;
        });

        window.App.audioObj.addEventListener('error', () => {
            let id = window.App.activeAudioId;
            if(id) {
                let isUstadz = id.includes('_ust_') || id === 'grade_modal';
                let btn = window.getEl('audio-btn-' + id);
                if(btn) btn.innerHTML = '<i class="ph-fill ph-play ' + (isUstadz ? 'text-xs' : 'text-sm') + '"></i>';
                window.App.activeAudioId = null;
            }
        });
    }

    window.playCustomAudio = function(id, url, savedDuration) {
        if (!window.App.audioObj) return;
        let a = window.App.audioObj;
        let isUstadz = id.includes('_ust_') || id === 'grade_modal';
        let getIcon = (state) => `<i class="ph-fill ${state === 'play' ? 'ph-play' : 'ph-pause'} ${isUstadz ? 'text-xs' : 'text-sm'}"></i>`;

        if (window.App.activeAudioId === id) {
            if (a.paused) { 
                a.play(); 
                let btn = window.getEl('audio-btn-' + id);
                if(btn) btn.innerHTML = getIcon('pause'); 
            } else { 
                a.pause(); 
                let btn = window.getEl('audio-btn-' + id);
                if(btn) btn.innerHTML = getIcon('play'); 
            }
            return;
        }
        
        if (window.App.activeAudioId) {
            let oldIsUst = window.App.activeAudioId.includes('_ust_') || window.App.activeAudioId === 'grade_modal';
            let oldBtn = window.getEl('audio-btn-' + window.App.activeAudioId);
            if(oldBtn) oldBtn.innerHTML = `<i class="ph-fill ph-play ${oldIsUst ? 'text-xs' : 'text-sm'}"></i>`;
            let oldBar = window.getEl('audio-bar-' + window.App.activeAudioId);
            if(oldBar) oldBar.style.width = '0%';
            let oldTime = window.getEl('audio-time-' + window.App.activeAudioId);
            if(oldTime) oldTime.innerText = '00:00';
        }
        
        window.App.activeAudioId = id;
        window.App.activeAudioDur = savedDuration;
        a.src = url;
        a.playbackRate = window.App.customAudioSpeed || 1;
        a.play().catch(e => {
            window.showAlert('Tidak dapat memutar rekaman. Browser butuh interaksi.');
            let btn = window.getEl('audio-btn-' + id);
            if(btn) btn.innerHTML = getIcon('play');
            window.App.activeAudioId = null;
        });
        
        let newBtn = window.getEl('audio-btn-' + id);
        if(newBtn) newBtn.innerHTML = getIcon('pause');
    };

    window.toggleCustomAudioSpeed = function(e) {
        if (e) e.stopPropagation();
        let speeds = [1, 1.25, 1.5, 2, 0.5, 0.75];
        let cur = window.App.customAudioSpeed || 1;
        let next = speeds[(speeds.indexOf(cur) + 1) % speeds.length];
        window.App.customAudioSpeed = next;
        if (window.App.audioObj) window.App.audioObj.playbackRate = next;
        document.querySelectorAll('.audio-speed-btn').forEach(btn => {
            btn.innerText = next + 'x';
        });
    };

    window.getLvl = () => {
        var lvls = window.App.levels.filter(l=>l.surahId===window.App.actSurahId);
        if (window.App.actLevelId) {
            var actLvl = lvls.find(l=>l.id === window.App.actLevelId);
            if (actLvl) return actLvl.id;
        }
        return lvls.length > 0 ? lvls[0].id : null;
    };
    
    // Sort array berdasarkan property 'order'
    window.getSgs = () => {
        let arr = window.App.segs.filter(s=>s.surahId===window.App.actSurahId&&s.levelId===window.getLvl());
        arr.sort((a,b) => {
            if (a.order !== undefined && b.order !== undefined) return a.order - b.order;
            if (a.order !== undefined) return -1;
            if (b.order !== undefined) return 1;
            return a.start - b.start;
        });
        return arr;
    };

    // Fungsi geser panah manual Up/Down
    window.moveSeg = function(id, dir) {
        let sgs = window.getSgs();
        let idx = sgs.findIndex(x => x.id === id);
        if (idx === -1 || idx + dir < 0 || idx + dir >= sgs.length) return;
        
        sgs.forEach((s, i) => { if (s.order === undefined) s.order = i; });
        
        let temp = sgs[idx].order;
        sgs[idx].order = sgs[idx+dir].order;
        sgs[idx+dir].order = temp;
        
        if(window.dbSave) {
            window.dbSave('segs', sgs[idx].id, sgs[idx]);
            window.dbSave('segs', sgs[idx+dir].id, sgs[idx+dir]);
        }
        window.render(true);
    };

    window.moveLevel = function(id, dir) {
        let lvls = window.App.levels.filter(l => l.surahId === window.App.actSurahId);
        lvls.sort((a,b) => (a.order||0) - (b.order||0));
        let idx = lvls.findIndex(x => x.id === id);
        if (idx === -1 || idx + dir < 0 || idx + dir >= lvls.length) return;
        
        lvls.forEach((l, i) => { if (l.order === undefined) l.order = i; });
        
        let temp = lvls[idx].order;
        lvls[idx].order = lvls[idx+dir].order;
        lvls[idx+dir].order = temp;
        
        if(window.dbSave) {
            window.dbSave('levels', lvls[idx].id, lvls[idx]);
            window.dbSave('levels', lvls[idx+dir].id, lvls[idx+dir]);
        }
        window.render(true);
    };

    // FITUR BARU: Fungsi untuk menyimpan & menyisipkan ulang urutan dari input manual form edit ayat
    window.saveSegment = function(e, id) {
        e.preventDefault();
        let sm=parseInt(window.val('sm')||0), ss=parseInt(window.val('ss')||0);
        let em=parseInt(window.val('em')||0), es=parseInt(window.val('es')||0);
        let t=window.val('st'), a=window.val('sa'), tr=window.val('str');
        
        // Ambil nilai urutan (Order) dari input (dikurangi 1 karena index array mulai dari 0)
        let newOrderInput = parseInt(window.val('so'));
        let newOrderIdx = (isNaN(newOrderInput) || newOrderInput < 1) ? 0 : newOrderInput - 1;
        
        let start = sm*60+ss; let end = em*60+es;
        let curSgs = window.getSgs(); 
        
        if (id) {
            let o = window.App.segs.find(x=>x.id===id);
            if (o) {
                o.title=t; o.start=start; o.end=end; o.arabic=a; o.translation=tr;
                let oldIdx = curSgs.findIndex(x=>x.id===id);
                
                if (newOrderIdx !== oldIdx && newOrderIdx >= 0) {
                    if (newOrderIdx >= curSgs.length) newOrderIdx = curSgs.length - 1;
                    
                    curSgs.splice(oldIdx, 1);
                    curSgs.splice(newOrderIdx, 0, o);
                    
                    curSgs.forEach((seg, idx) => {
                        let actualSeg = window.App.segs.find(x=>x.id === seg.id);
                        if(actualSeg) { 
                            actualSeg.order = idx; 
                            if(window.dbSave) window.dbSave('segs', actualSeg.id, actualSeg); 
                        }
                    });
                } else {
                    if(window.dbSave) window.dbSave('segs', id, o);
                }
            }
        } else {
            let nid = Date.now();
            if (newOrderIdx > curSgs.length) newOrderIdx = curSgs.length;
            
            let nD = {id:nid, surahId:window.App.actSurahId, levelId:window.getLvl(), title:t, start:start, end:end, arabic:a, translation:tr, order:newOrderIdx};
            window.App.segs.push(nD);
            
            curSgs.splice(newOrderIdx, 0, nD);
            curSgs.forEach((seg, idx) => {
                let actualSeg = window.App.segs.find(x=>x.id === seg.id);
                if(actualSeg) { 
                    actualSeg.order = idx; 
                    if(window.dbSave) window.dbSave('segs', actualSeg.id, actualSeg); 
                }
            });
        }
        window.App.modal=null; 
        window.render(true);
    };

    window.executeExportCSV = function() {
        let type = window.App.modalData;
        let start = window.getEl('exp_start').value;
        let end = window.getEl('exp_end').value;
        
        let startTime = start ? new Date(start).setHours(0,0,0,0) : 0;
        let endTime = end ? new Date(end).setHours(23,59,59,999) : Infinity;

        let data, headers, filename, items;
        const sQ = window.App.search.toLowerCase();
        const sQSiswa = (window.App.searchSiswa || '').toLowerCase();

        if (type === 'halaqoh') {
            items = sQ ? window.App.halaqohs.filter(h => h.name.toLowerCase().includes(sQ)) : (window.App.hierSel.u ? window.App.halaqohs.filter(h=>h.ustadzId==window.App.hierSel.u) : []);
            items = items.filter(x => x.id >= startTime && x.id <= endTime);
            if (items.length === 0) { window.showAlert('Tidak ada data Halaqoh untuk diekspor pada rentang ini.'); return; }
            headers = ['ID Halaqoh', 'Nama Halaqoh', 'ID Ustadz', 'Nama Ustadz', 'Total Lulus'];
            const ustadzName = window.getRawUName(window.App.hierSel.u);
            filename = `Data_Halaqoh_${ustadzName.replace(/\s+/g, '_')}.csv`;
            data = items.map(h => {
                let hGraded = window.App.subs.filter(sb => sb.halaqohId == h.id && sb.status === 'graded').length;
                return [h.id, h.name, h.ustadzId, window.getRawUName(h.ustadzId), hGraded];
            });
        } else if (type === 'siswa') {
            items = (sQ || sQSiswa) ? window.App.siswas.filter(s => s.name.toLowerCase().includes(sQ || sQSiswa) || s.kelas.toLowerCase().includes(sQ || sQSiswa)) : (window.App.hierSel.h ? window.App.siswas.filter(s=>s.halaqohId==window.App.hierSel.h) : []);
            items = items.filter(x => x.id >= startTime && x.id <= endTime);
            if (items.length === 0) { window.showAlert('Tidak ada data Santri untuk diekspor pada rentang ini.'); return; }
            headers = ['ID Santri', 'Nama Santri', 'Kelas', 'ID Halaqoh', 'Nama Halaqoh', 'Total Lulus'];
            const halaqohName = window.getRawHName(window.App.hierSel.h);
            filename = `Data_Santri_${halaqohName.replace(/\s+/g, '_')}.csv`;
            data = items.map(s => {
                let sGraded = window.App.subs.filter(sb => sb.siswaId == s.id && sb.status === 'graded').length;
                return [s.id, s.name, s.kelas, s.halaqohId, window.getRawHName(s.halaqohId), sGraded];
            });
        } else if (type === 'hub') {
            let fs = window.App.subs;
            let tUidHub = window.App.adminLvl === 2 ? window.App.loggedInUstadzId : (window.App.filter.u !== 'all' ? Number(window.App.filter.u) : null);
            if (tUidHub !== null) {
                let uHals = window.App.halaqohs.filter(h=>h.ustadzId === tUidHub).map(h=>h.id);
                let uSws = window.App.siswas.filter(s=>uHals.includes(s.halaqohId)).map(s=>s.id);
                fs = fs.filter(sb => sb.ustadzId === tUidHub || uSws.includes(sb.siswaId));
            }
            if (window.App.filter.h !== 'all') {
                let tHid = Number(window.App.filter.h);
                let hSws = window.App.siswas.filter(s=>s.halaqohId === tHid).map(s=>s.id);
                fs = fs.filter(sb => sb.halaqohId === tHid || hSws.includes(sb.siswaId));
            }
            if (window.App.filter.s !== 'all') {
                fs = fs.filter(sb => sb.siswaId === Number(window.App.filter.s));
            }
            if (sQ) {
                fs = fs.filter(x=>{
                    let su=window.App.surahs.find(y=>y.id===x.surahId); 
                    return (su&&su.title.toLowerCase().includes(sQ)) || window.getSName(x.siswaId).toLowerCase().includes(sQ);
                });
            }
            items = fs.filter(x => x.id >= startTime && x.id <= endTime);
            if (items.length === 0) { window.showAlert('Tidak ada data Setoran untuk diekspor pada rentang ini.'); return; }
            headers = ['ID Setoran', 'Tanggal', 'Nama Santri', 'Kelas', 'Halaqoh', 'Ustadz', 'Surah', 'Segmen', 'Status', 'Nilai', 'Catatan Teks'];
            filename = `Riwayat_Setoran_${new Date().getTime()}.csv`;
            data = items.map(sb => {
                let su = window.App.surahs.find(x=>x.id===sb.surahId);
                let sg = window.App.segs.find(x=>x.id===sb.segmentId);
                let cStu = window.App.siswas.find(x=>x.id===sb.siswaId);
                let cHalaqohId = cStu ? cStu.halaqohId : sb.halaqohId;
                let cHalaqoh = window.App.halaqohs.find(x=>x.id===cHalaqohId);
                let cUstadzId = cHalaqoh ? cHalaqoh.ustadzId : sb.ustadzId;
                return [sb.id, sb.date, window.getSName(sb.siswaId), window.getSKelas(sb.siswaId), window.getHName(cHalaqohId), window.getUName(cUstadzId), su ? su.title : '-', sg ? sg.title : '-', sb.status, sb.grade || '-', sb.note || '-'];
            });
        } else {
            return;
        }

        const toCsv = (rows) => rows.map(row => row.map(val => { const str = String(val === null || val === undefined ? '' : val); return `"${str.replace(/"/g, '""')}"`; }).join(',')).join('\n');

        const csvContent = toCsv([headers, ...data]);
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url); link.setAttribute("download", filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        
        window.App.modal = null; window.render(true);
    };

      if (window.App.isLoading) return;
      window.App.isLoading = true;

      try {
          if (window.syncFirebaseData) {
              await window.syncFirebaseData();
          }
          // Tambahkan sedikit delay untuk estetika animasi loading

      window.App.isLoading = false;

    document.addEventListener('touchstart', (e) => {
      const sc = window.getEl('main-scroll');
      if (!sc || sc.scrollTop > 0) { window.App.pullStart = null; return; }
      window.App.pullStart = e.touches[0].pageY;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (window.App.pullStart === null) return;
      const delta = e.touches[0].pageY - window.App.pullStart;
      if (delta > 0) {
        window.App.pullDelta = Math.min(delta, 80);
        const indicator = window.getEl('pull-indicator');
        if (indicator) {
          indicator.style.height = window.App.pullDelta + 'px';
          indicator.style.opacity = Math.min(1, window.App.pullDelta / 60);
          const icon = indicator.querySelector('i');
          if(icon) icon.style.transform = `rotate(${window.App.pullDelta * 4}deg)`;
        }
      }
    }, { passive: true });

    document.addEventListener('touchend', () => {
      if (window.App.pullStart === null) return;
      if (window.App.pullDelta >= 70) window.refreshApp();
      window.App.pullStart = null; window.App.pullDelta = 0;
      const ind = window.getEl('pull-indicator');
      if (ind) { ind.style.height = '0px'; ind.style.opacity = '0'; }
    });

    window.initYTPlayer = function() {
        if(!window.YT || !window.YT.Player) return;
        var sur = window.App.surahs.find(s=>s.id===window.App.actSurahId);
        let vId = sur?.videoId || '';
        
        if (window.App.yt && typeof window.App.yt.destroy === 'function') { 
            try { window.App.yt.destroy(); } catch(e){} 
            window.App.yt = null; 
        }
        
        let pWrap = window.getEl('persistent-player-wrapper');
        if (pWrap) {
            pWrap.innerHTML = '<div id="youtube-player" class="w-full h-full"></div>';
        }

        if (!vId) return;

        window.App.yt = new window.YT.Player('youtube-player', {
            host: 'https://www.youtube-nocookie.com', videoId: vId, 
            playerVars: { controls:0, disablekb:1, rel:0, modestbranding:1, playsinline:1 },
            events: {
                onReady: e => { e.target.setPlaybackRate(window.App.speed); },
                onStateChange: e => {
                    if(e.data===window.YT.PlayerState.PLAYING){
                        window.App.isPlay=true;
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-pause text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-100', 'scale-95'); bigBtn.classList.replace('opacity-100', 'opacity-0'); }
                    } else if(e.data===window.YT.PlayerState.PAUSED||e.data===window.YT.PlayerState.ENDED){
                        window.App.isPlay=false;
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-play text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-95', 'scale-100'); bigBtn.classList.replace('opacity-0', 'opacity-100'); }
                    }
                },
                onError: e => { window.App.isPlay=false; console.error("YouTube Error", e); }
            }
        });
    };

    window.startStudentRecord = async function() {
        try {
            var stream = await navigator.mediaDevices.getUserMedia({audio: true}); 
            
            let mimeType = '';
            if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4'; 
            else if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
            else if (MediaRecorder.isTypeSupported('audio/webm')) mimeType = 'audio/webm';
            
            var options = mimeType ? { mimeType: mimeType } : {};
            window.App.studentMediaRecorder = new MediaRecorder(stream, options); 
            window.App.studentAudioChunks = [];
            
            window.App.studentMediaRecorder.ondataavailable = e => { if(e.data.size > 0) window.App.studentAudioChunks.push(e.data); };
            window.App.studentMediaRecorder.onstop = async () => { 
                var b = new Blob(window.App.studentAudioChunks, { type: mimeType || 'audio/webm' }); 
                window.App.currentStudentAudioUrl = await window.blobToBase64(b); 
                stream.getTracks().forEach(t => t.stop()); 
                window.render(true); 
            };
            
            window.App.studentMediaRecorder.start(); 
            window.App.rec.is = true; 
            window.App.rec.secs = 0; 
            window.render(true);
            
            window.App.rec.int = setInterval(()=>{ 
                window.App.rec.secs++; 
                let tEl = window.getEl('rec-timer-display');
                if (tEl) {
                    tEl.innerText = window.fmtT(window.App.rec.secs);
                } else {

    window.processImport = function(type) {
        let textInput = document.getElementById('import_text');
        if (!textInput || !textInput.value.trim()) {
            window.showAlert("Paste data dari spreadsheet terlebih dahulu!");
            return;
        }
        
        let btn = textInput.nextElementSibling;
        let oldHtml = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i> Memproses...';
        btn.disabled = true;

        setTimeout(() => {
            let text = textInput.value;
            let rows = text.split('\n').map(r => r.trim()).filter(r => r.length > 0);
            let successCount = 0;
            let baseId = Date.now();

            if (type === 'ustadz') {
                rows.forEach((row, idx) => {
                    let cols = row.split(/\t|\||,/);
                    let name = cols[0] ? cols[0].trim().replace(/^"|"$/g, '') : '';
                    let phone = cols.length > 1 ? cols[1].trim().replace(/^"|"$/g, '') : '';
                    let username = cols.length > 2 ? cols[2].trim().replace(/^"|"$/g, '') : '';
                    let password = cols.length > 3 ? cols[3].trim().replace(/^"|"$/g, '') : '';
                    if (name && username && password) {
                        let nD = { id: baseId + idx, name: name, phone: phone, username: username, password: password };
                        window.App.ustadz.push(nD);
                        window.dbSave('ustadz', nD.id, nD);
                        successCount++;
                    }
                });
            } else if (type === 'halaqoh') {
                rows.forEach((row, idx) => {
                    let cols = row.split(/\t|\||,/); 
                    let name = cols[0] ? cols[0].trim().replace(/^"|"$/g, '') : '';
                    if (name) {
                        let nD = { id: baseId + idx, ustadzId: window.App.hierSel.u, name: name };
                        window.App.halaqohs.push(nD);
                        window.dbSave('halaqohs', nD.id, nD);
                        successCount++;
                    }
                });
            } else if (type === 'siswa') {
                rows.forEach((row, idx) => {
                    let cols = row.split(/\t|\||,/); 
                    let name = cols[0] ? cols[0].trim().replace(/^"|"$/g, '') : '';
                    let kelas = cols.length > 1 ? cols[1].trim().replace(/^"|"$/g, '') : '-';
                    if (name) {
                        let nD = { id: baseId + idx, halaqohId: window.App.hierSel.h, name: name, kelas: kelas };
                        window.App.siswas.push(nD);
                        window.dbSave('siswas', nD.id, nD);
                        successCount++;
                    }
                });
            }
            window.App.modal = null;
            window.render(true);
            window.showAlert(`Berhasil mengimpor ${successCount} data.`);
        }, 100);
    };

        if(e<s){e=s;window.val('seg-end-ayat',e);}

        var isFatihah = sur && sur.title.toLowerCase().includes('al-fatihah');

        var aT=[]; var iT=[];
        for(var i=s;i<=e;i++){
            var id=i-1;

                   localStorage.setItem('tahfidzqu_subtitle', window.App.schSub);
               } catch(e) {}
               window.render();
           }
       });

       ['juzs','surahs','levels','segs','ustadz','halaqohs','siswas','subs'].forEach(c => {
          onValue(ref(db, `artifacts/${safeId}/public/data/${c}`), snap => {
             const obj = snap.val();
             window.App[c] = obj ? Object.keys(obj).map(k => ({id: isNaN(k) ? k : Number(k), ...obj[k]})) : [];
             
             if (c === 'juzs' && window.App.juzs.length > 0) {
                 if (!window.App.juzs.some(j => j.id == window.App.actJuzId)) {
                     let defaultJuz = window.App.juzs.find(j => j.id == 30 || String(j.name).includes("30"));
                     window.App.actJuzId = defaultJuz ? defaultJuz.id : window.App.juzs[0].id;
                 }
             }

             window.render();
          }, error => {
             console.error(error);
             if (error.message.includes('permission_denied') || error.code === 'PERMISSION_DENIED') {
                 window.App.firebaseError = "Akses Cloud Ditolak! Ubah Aturan (Rules) Realtime Database Anda menjadi '.read': true dan '.write': true";
                 window.render();
             }
          });
       });
       
       setInterval(() => {
          if (window.App.view === 'player' && window.App.isPlay && window.App.yt && typeof window.App.yt.getCurrentTime === 'function' && window.App.actSurahId) {
             var t = window.App.yt.getCurrentTime(); var sg = window.getActSeg(); if(!sg) return;
             if(window.getEl('time-display')) window.getEl('time-display').innerText = `${window.fmtT(t)} / ${window.fmtT(sg.end)}`;
             var td = window.getSgs().slice(-1)[0]?.end || 200;
             if(window.getEl('current-time-indicator')) window.getEl('current-time-indicator').style.left = `${Math.min(100, (t/td)*100)}%`;
             if (t >= sg.end) {
                if (window.App.curRep + 1 < window.App.repTarget) { window.App.yt.seekTo(sg.start); window.App.curRep++; if(window.getEl('rep-text')) window.getEl('rep-text').innerText = `(Ke-${window.App.curRep+1})`; }
                else { window.App.yt.pauseVideo(); window.App.isPlay = false; window.App.curRep = 0; if(window.getEl('rep-text')) window.getEl('rep-text').innerText = ''; }
             }
          }
       }, 200);
    });
  </script>
</body>
