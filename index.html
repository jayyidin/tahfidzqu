<body class="bg-slate-50 text-slate-800 dark:bg-[#0a120f] dark:text-gray-200 font-sans flex flex-col w-full h-full transition-colors duration-300 antialiased">

  <div id="app-root" class="flex flex-col w-full h-full relative z-10"></div>

  <div id="persistent-player-wrapper" class="hidden pointer-events-none">
      <div id="youtube-player" class="w-full h-full"></div>

  <script>
    window.esc = function(str) {
        if (!str) return '';
        return String(str).replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
    };

    window.getEl = function(id) { return document.getElementById(id); };
    window.hide = function(id) { var e = window.getEl(id); if(e) e.classList.add('hidden'); };
    window.show = function(id) { var e = window.getEl(id); if(e) e.classList.remove('hidden'); };
    window.val = function(id, v) { var e = window.getEl(id); if(!e) return ''; if(v !== undefined) e.value = v; return e.value; };
    window.text = function(id, t) { var e = window.getEl(id); if(e) e.innerText = t; };

    window.fixAudio = function(el) {
        if (el.dataset.fixed === "true") return;
        let doFix = function() {
            if (el.dataset.fixed === "true") return;
            el.dataset.fixed = "true"; 
            let m = el.muted;
            el.muted = true; 
            let onSeeked = function() {
                el.removeEventListener('seeked', onSeeked);
                el.currentTime = 0; 
                setTimeout(() => { el.muted = m; }, 50); 
            };
            el.addEventListener('seeked', onSeeked);
            el.currentTime = 1e8; 
        };
        el.addEventListener('play', doFix);
        if (el.readyState >= 1) { doFix(); }
    };

    const Q_SURAHS = JSON.parse('[{"no":1,"name":"Al-Fatihah","juz":[1]},{"no":2,"name":"Al-Baqarah","juz":[1,2,3]},{"no":3,"name":"Ali \'Imran","juz":[3,4]},{"no":4,"name":"An-Nisa\'","juz":[4,5,6]},{"no":5,"name":"Al-Ma\'idah","juz":[6,7]},{"no":6,"name":"Al-An\'am","juz":[7,8]},{"no":7,"name":"Al-A\'raf","juz":[8,9]},{"no":8,"name":"Al-Anfal","juz":[9,10]},{"no":9,"name":"At-Taubah","juz":[10,11]},{"no":10,"name":"Yunus","juz":[11]},{"no":11,"name":"Hud","juz":[11,12]},{"no":12,"name":"Yusuf","juz":[12,13]},{"no":13,"name":"Ar-Ra\'d","juz":[13]},{"no":14,"name":"Ibrahim","juz":[13]},{"no":15,"name":"Al-Hijr","juz":[14]},{"no":16,"name":"An-Nahl","juz":[14]},{"no":17,"name":"Al-Isra\'","juz":[15]},{"no":18,"name":"Al-Kahf","juz":[15,16]},{"no":19,"name":"Maryam","juz":[16]},{"no":20,"name":"Taha","juz":[16]},{"no":21,"name":"Al-Anbiya\'","juz":[17]},{"no":22,"name":"Al-Hajj","juz":[17]},{"no":23,"name":"Al-Mu\'minun","juz":[18]},{"no":24,"name":"An-Nur","juz":[18]},{"no":25,"name":"Al-Furqan","juz":[18,19]},{"no":26,"name":"Asy-Syu\'ara\'","juz":[19]},{"no":27,"name":"An-Naml","juz":[19,20]},{"no":28,"name":"Al-Qasas","juz":[20]},{"no":29,"name":"Al-\'Ankabut","juz":[20,21]},{"no":30,"name":"Ar-Rum","juz":[21]},{"no":31,"name":"Luqman","juz":[21]},{"no":32,"name":"As-Sajdah","juz":[21]},{"no":33,"name":"Al-Ahzab","juz":[21,22]},{"no":34,"name":"Saba\'","juz":[22]},{"no":35,"name":"Fatir","juz":[22]},{"no":36,"name":"Yasin","juz":[22,23]},{"no":37,"name":"As-Saffat","juz":[23]},{"no":38,"name":"Sad","juz":[23]},{"no":39,"name":"Az-Zumar","juz":[23,24]},{"no":40,"name":"Ghafir","juz":[24]},{"no":41,"name":"Fussilat","juz":[24,25]},{"no":42,"name":"Asy-Syura","juz":[25]},{"no":43,"name":"Az-Zukhruf","juz":[25]},{"no":44,"name":"Ad-Dukhan","juz":[25]},{"no":45,"name":"Al-Jasiyah","juz":[25]},{"no":46,"name":"Al-Ahqaf","juz":[26]},{"no":47,"name":"Muhammad","juz":[26]},{"no":48,"name":"Al-Fath","juz":[26]},{"no":49,"name":"Al-Hujurat","juz":[26]},{"no":50,"name":"Qaf","juz":[26]},{"no":51,"name":"Az-Zariyat","juz":[26,27]},{"no":52,"name":"At-Tur","juz":[27]},{"no":53,"name":"An-Najm","juz":[27]},{"no":54,"name":"Al-Qamar","juz":[27]},{"no":55,"name":"Ar-Rahman","juz":[27]},{"no":56,"name":"Al-Waqi\'ah","juz":[27]},{"no":57,"name":"Al-Hadid","juz":[27]},{"no":58,"name":"Al-Mujadilah","juz":[28]},{"no":59,"name":"Al-Hasyr","juz":[28]},{"no":60,"name":"Al-Mumtahanah","juz":[28]},{"no":61,"name":"As-Saff","juz":[28]},{"no":62,"name":"Al-Jumu\'ah","juz":[28]},{"no":63,"name":"Al-Munafiqun","juz":[28]},{"no":64,"name":"At-Tagabun","juz":[28]},{"no":65,"name":"At-Talaq","juz":[28]},{"no":66,"name":"At-Tahrim","juz":[28]},{"no":67,"name":"Al-Mulk","juz":[29]},{"no":68,"name":"Al-Qalam","juz":[29]},{"no":69,"name":"Al-Haqqah","juz":[29]},{"no":70,"name":"Al-Ma\'arij","juz":[29]},{"no":71,"name":"Nuh","juz":[29]},{"no":72,"name":"Al-Jinn","juz":[29]},{"no":73,"name":"Al-Muzzammil","juz":[29]},{"no":74,"name":"Al-Muddassir","juz":[29]},{"no":75,"name":"Al-Qiyamah","juz":[29]},{"no":76,"name":"Al-Insan","juz":[29]},{"no":77,"name":"Al-Mursalat","juz":[29]},{"no":78,"name":"An-Naba\'","juz":[30]},{"no":79,"name":"An-Nazi\'at","juz":[30]},{"no":80,"name":"\'Abasa","juz":[30]},{"no":81,"name":"At-Takwir","juz":[30]},{"no":82,"name":"Al-Infitar","juz":[30]},{"no":83,"name":"Al-Mutaffifin","juz":[30]},{"no":84,"name":"Al-Insyiqaq","juz":[30]},{"no":85,"name":"Al-Buruj","juz":[30]},{"no":86,"name":"At-Tariq","juz":[30]},{"no":87,"name":"Al-A\'la","juz":[30]},{"no":88,"name":"Al-Gasyiyah","juz":[30]},{"no":89,"name":"Al-Fajr","juz":[30]},{"no":90,"name":"Al-Balad","juz":[30]},{"no":91,"name":"Asy-Syams","juz":[30]},{"no":92,"name":"Al-Lail","juz":[30]},{"no":93,"name":"Ad-Duha","juz":[30]},{"no":94,"name":"Al-Insyirah","juz":[30]},{"no":95,"name":"At-Tin","juz":[30]},{"no":96,"name":"Al-\'Alaq","juz":[30]},{"no":97,"name":"Al-Qadr","juz":[30]},{"no":98,"name":"Al-Bayyinah","juz":[30]},{"no":99,"name":"Az-Zalzalah","juz":[30]},{"no":100,"name":"Al-\'Adiyat","juz":[30]},{"no":101,"name":"Al-Qari\'ah","juz":[30]},{"no":102,"name":"At-Takasur","juz":[30]},{"no":103,"name":"Al-\'Asr","juz":[30]},{"no":104,"name":"Al-Humazah","juz":[30]},{"no":105,"name":"Al-Fil","juz":[30]},{"no":106,"name":"Quraisy","juz":[30]},{"no":107,"name":"Al-Ma\'un","juz":[30]},{"no":108,"name":"Al-Kausar","juz":[30]},{"no":109,"name":"Al-Kafirun","juz":[30]},{"no":110,"name":"An-Nasr","juz":[30]},{"no":111,"name":"Al-Lahab","juz":[30]},{"no":112,"name":"Al-Ikhlas","juz":[30]},{"no":113,"name":"Al-Falaq","juz":[30]},{"no":114,"name":"An-Nas","juz":[30]}]');

    window.App = {
      theme: localStorage.getItem('tahfidzqu_theme') || 'light',
      adminLvl: 0, view: 'home', schLogo: localStorage.getItem('tahfidzqu_logo') || '',
      schSub: localStorage.getItem('tahfidzqu_subtitle') || 'Madrasah Tahfidz Quran',
      search: '', loginAttempts: 0, lockoutTime: 0, loginError: '', inactivityTimer: null,
      customDialog: { show: false, type: 'alert', message: '', onConfirm: null },
      juzs: [], surahs: [], levels: [], segs: [], ustadz: [], halaqohs: [], siswas: [], subs: [],
      actJuzId: 1, actSurahId: null, actSegId: null,
      yt: null, isPlay: false, repTarget: 7, curRep: 0, speed: 1, interval: null,
      modal: null, modalData: null, filter: {u:'all', h:'all', s:'all'}, hierSel: {u:null, h:null, s:null},
      rec: {is:false, secs:0, int:null, src:'player'}, resubmitId: null, 
      editingUstadzId: null, editingHalaqohId: null, editingSiswaId: null,
      currentGradingAudioUrl: null, isGradingRecording: false, gradingMediaRecorder: null, gradingAudioChunks: [],
      studentMediaRecorder: null, studentAudioChunks: [], currentStudentAudioUrl: null,
      audioObj: null, activeAudioId: null, activeAudioDur: 0,
      firebaseError: '' 
    };

    window.fmtT = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    
    // PEMUTAR AUDIO KUSTOM ANTI-BUG (DIBUAT OLEH FRIDAY)
    if (!window.App.audioObj) {
        window.App.audioObj = new Audio();
        
        window.App.audioObj.addEventListener('timeupdate', () => {
            let id = window.App.activeAudioId;
            if(!id) return;
            
            let elTime = window.getEl('audio-time-' + id);
            let elBar = window.getEl('audio-bar-' + id);
            let a = window.App.audioObj;
            
            let ct = a.currentTime;
            if (!ct || isNaN(ct)) ct = 0;
            
            if(elTime) elTime.innerText = window.fmtT(ct); 
            
            if(elBar) {
                let d = window.App.activeAudioDur || a.duration;
                if (!d || isNaN(d) || d === Infinity || d <= 0) d = Math.max(10, ct + 2);
                let pct = Math.min(100, (ct / d) * 100);
                elBar.style.width = pct + '%';
            }
        });
        
        window.App.audioObj.addEventListener('ended', () => {
            let id = window.App.activeAudioId;
            if(!id) return;
            let isUstadz = id.startsWith('ust_') || id === 'grade_modal';
            let btn = window.getEl('audio-btn-' + id);
            let elBar = window.getEl('audio-bar-' + id);
            let elTime = window.getEl('audio-time-' + id);
            if(btn) btn.innerHTML = '<i class="ph-fill ph-play ' + (isUstadz ? 'text-xs' : 'text-sm') + '"></i>';
            if(elBar) elBar.style.width = '0%';
            if(elTime) elTime.innerText = '00:00';
            window.App.activeAudioId = null;
        });

        window.App.audioObj.addEventListener('error', () => {
            let id = window.App.activeAudioId;
            if(id) {
                let isUstadz = id.startsWith('ust_') || id === 'grade_modal';
                let btn = window.getEl('audio-btn-' + id);
                if(btn) btn.innerHTML = '<i class="ph-fill ph-play ' + (isUstadz ? 'text-xs' : 'text-sm') + '"></i>';
                window.App.activeAudioId = null;
            }
        });
    }

    window.playCustomAudio = function(id, url, savedDuration) {
        if (!window.App.audioObj) return;
        let a = window.App.audioObj;
        let isUstadz = id.startsWith('ust_') || id === 'grade_modal';
        let getIcon = (state) => `<i class="ph-fill ${state === 'play' ? 'ph-play' : 'ph-pause'} ${isUstadz ? 'text-xs' : 'text-sm'}"></i>`;

        if (window.App.activeAudioId === id) {
            if (a.paused) { 
                a.play(); 
                let btn = window.getEl('audio-btn-' + id);
                if(btn) btn.innerHTML = getIcon('pause'); 
            } else { 
                a.pause(); 
                let btn = window.getEl('audio-btn-' + id);
                if(btn) btn.innerHTML = getIcon('play'); 
            }
            return;
        }
        
        if (window.App.activeAudioId) {
            let oldIsUst = window.App.activeAudioId.startsWith('ust_') || window.App.activeAudioId === 'grade_modal';
            let oldBtn = window.getEl('audio-btn-' + window.App.activeAudioId);
            if(oldBtn) oldBtn.innerHTML = `<i class="ph-fill ph-play ${oldIsUst ? 'text-xs' : 'text-sm'}"></i>`;
            let oldBar = window.getEl('audio-bar-' + window.App.activeAudioId);
            if(oldBar) oldBar.style.width = '0%';
            let oldTime = window.getEl('audio-time-' + window.App.activeAudioId);
            if(oldTime) oldTime.innerText = '00:00';
        }
        
        window.App.activeAudioId = id;
        window.App.activeAudioDur = savedDuration;
        a.src = url;
        a.play().catch(e => {
            window.showAlert('Tidak dapat memutar rekaman. Browser butuh interaksi.');
            let btn = window.getEl('audio-btn-' + id);
            if(btn) btn.innerHTML = getIcon('play');
            window.App.activeAudioId = null;
        });
        
        let newBtn = window.getEl('audio-btn-' + id);
        if(newBtn) newBtn.innerHTML = getIcon('pause');
    };

    window.renderCustomAudio = function(id, url, duration, isUstadz = false) {
        if (!url) return '<span class="text-[10px] md:text-xs text-slate-400 italic bg-slate-50 dark:bg-[#1a2e26] px-4 py-3 rounded-2xl border border-dashed border-slate-200 dark:border-transparent w-full text-center inline-block">Rekaman tidak tersedia</span>';
        
        let isPlay = (window.App.activeAudioId === id && window.App.audioObj && !window.App.audioObj.paused);
        let ic = isPlay ? 'ph-pause' : 'ph-play';
        let btnColor = isUstadz ? 'bg-blue-500 hover:bg-blue-600' : 'bg-emerald-500 hover:bg-emerald-600';
        let barColor = isUstadz ? 'bg-blue-500' : 'bg-emerald-500';
        let iconSize = isUstadz ? 'text-xs' : 'text-sm';
        let btnSize = isUstadz ? 'w-8 h-8 md:w-9 md:h-9' : 'w-10 h-10 md:w-11 md:h-11';
        
        return '<div class="flex items-center gap-2 md:gap-3 bg-slate-50 dark:bg-[#0a120f] border border-slate-200 dark:border-[#1a2e26] p-1.5 md:p-2 rounded-full w-full shadow-sm" onclick="event.stopPropagation();"><button type="button" id="audio-btn-' + id + '" onclick="window.playCustomAudio(\'' + id + '\', \'' + url + '\', ' + duration + '); event.stopPropagation();" class="' + btnSize + ' rounded-full ' + btnColor + ' text-white flex items-center justify-center shrink-0 transition-colors shadow-md active:scale-95"><i class="ph-fill ' + ic + ' ' + iconSize + '"></i></button><div class="flex-1 flex items-center gap-2 pr-2 md:pr-3"><div class="h-1.5 flex-1 bg-slate-200 dark:bg-[#15241e] rounded-full overflow-hidden relative"><div id="audio-bar-' + id + '" class="absolute left-0 top-0 h-full ' + barColor + ' rounded-full transition-all duration-100" style="width: ' + (isPlay?'auto':'0%') + '"></div></div><span id="audio-time-' + id + '" class="text-[9px] md:text-[10px] font-mono font-medium text-slate-500 dark:text-gray-400 w-8 text-right">00:00</span></div></div>';
    };

    window.getLvl = () => {
        var lvls = window.App.levels.filter(l=>l.surahId===window.App.actSurahId);
        var activeLvl = lvls.find(l=>l.active);
        if (activeLvl) return activeLvl.id;
        return lvls.length > 0 ? lvls[0].id : null;
    };
    
    window.getSgs = () => window.App.segs.filter(s=>s.surahId===window.App.actSurahId&&s.levelId===window.getLvl()).sort((a,b)=>a.start-b.start);
    window.getActSeg = () => { var s=window.getSgs(); if(s.length===0)return null; return s.find(x=>x.id===window.App.actSegId)||s[0]; };
    window.getUName = id => window.esc(window.App.ustadz.find(x=>x.id==id)?.name||"-");
    window.getHName = id => window.esc(window.App.halaqohs.find(x=>x.id==id)?.name||"-");
    window.getSName = id => window.esc(window.App.siswas.find(x=>x.id==id)?.name||"-");
    window.getSKelas = id => window.esc(window.App.siswas.find(x=>x.id==id)?.kelas||"-");
    window.toArabicNumeral = en => (""+en).replace(/[0-9]/g, t=>String.fromCharCode(t.charCodeAt(0)+1584));
    window.extractVideoId = url => { if(!url)return null; var m=url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/); return (m&&m[2].length===11)?m[2]:null; };

    window.switchView = function(viewTarget) {
      if(window.App.view === 'player' && viewTarget !== 'player') {
          if(window.App.yt && typeof window.App.yt.pauseVideo === 'function') {
              window.App.yt.pauseVideo(); window.App.isPlay = false;
          }
      }
      if(window.App.audioObj && !window.App.audioObj.paused) {
          window.App.audioObj.pause();
          window.App.activeAudioId = null;
      }
      window.App.search = ''; 
      window.App.view = viewTarget;
      window.render(true);
    };

    window.resetTimer = function() {
        clearTimeout(window.App.inactivityTimer);
        if (window.App.adminLvl > 0) {
            window.App.inactivityTimer = setTimeout(() => {
                window.App.adminLvl = 0;
                window.showAlert("Sesi keamanan Anda telah habis (15 menit tidak ada aktivitas). Anda otomatis dikeluarkan.");
                window.switchView('home');
            }, 15 * 60 * 1000);
        }
    };
    document.addEventListener('mousemove', window.resetTimer, {passive: true});
    document.addEventListener('keypress', window.resetTimer, {passive: true});
    document.addEventListener('touchstart', window.resetTimer, {passive: true});

    window.showAlert = function(msg) { window.App.customDialog = { show: true, type: 'alert', message: msg, onConfirm: null }; window.render(); };
    window.showConfirm = function(msg, cb) { window.App.customDialog = { show: true, type: 'confirm', message: msg, onConfirm: cb }; window.render(); };
    window.closeDialog = function() { window.App.customDialog.show = false; window.render(); };

    window.selectSeg = function(id) {
        window.App.actSegId = id; window.App.curRep = 0;
        let sgs = window.App.segs.filter(s=>s.surahId===window.App.actSurahId).sort((a,b)=>a.start-b.start);
        let sg = sgs.find(x => x.id === id);
        if(!sg) return;
        if(window.App.yt && typeof window.App.yt.seekTo === 'function') { window.App.yt.seekTo(sg.start); window.App.yt.playVideo(); window.App.isPlay = true; }
        window.updatePlayerDOM();
        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-pause text-2xl lg:text-3xl hover:text-emerald-400"></i>';
        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-100', 'scale-95'); bigBtn.classList.replace('opacity-100', 'opacity-0'); }

        var sur = window.App.surahs.find(s=>s.id===window.App.actSurahId);
        
        if (window.App.yt && typeof window.App.yt.destroy === 'function') {

        let pWrap = window.getEl('persistent-player-wrapper');
        if (pWrap) {
            pWrap.innerHTML = '<div id="youtube-player" class="w-full h-full"></div>';
        }

        window.App.yt = new window.YT.Player('youtube-player', {
            host: 'https://www.youtube-nocookie.com', videoId: sur?.videoId||'', 
            playerVars: { controls:0, disablekb:1, rel:0, modestbranding:1, playsinline:1 },
            events: {
                onReady: e => { e.target.setPlaybackRate(window.App.speed); },
                onStateChange: e => {
                    if(e.data===window.YT.PlayerState.PLAYING){
                        window.App.isPlay=true;
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-pause text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-100', 'scale-95'); bigBtn.classList.replace('opacity-100', 'opacity-0'); }

                        window.App.isPlay=false;
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-play text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-95', 'scale-100'); bigBtn.classList.replace('opacity-0', 'opacity-100'); }
                    }
                },
                onError: e => { window.App.isPlay=false; console.error("YouTube Error", e); }
            }
        });
    };

    window.blobToBase64 = function(blob) { return new Promise((resolve) => { const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(blob); }); };

    window.startStudentRecord = async function() {
        try {
            var stream = await navigator.mediaDevices.getUserMedia({audio: true}); 
            
            let mimeType = '';
            if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4'; 
            else if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
            else if (MediaRecorder.isTypeSupported('audio/webm')) mimeType = 'audio/webm';
            
            var options = mimeType ? { mimeType: mimeType } : {};
            window.App.studentMediaRecorder = new MediaRecorder(stream, options); 
            window.App.studentAudioChunks = [];
            
            window.App.studentMediaRecorder.ondataavailable = e => { if(e.data.size > 0) window.App.studentAudioChunks.push(e.data); };
            window.App.studentMediaRecorder.onstop = async () => { 
                var b = new Blob(window.App.studentAudioChunks, { type: mimeType || 'audio/webm' }); 
                window.App.currentStudentAudioUrl = await window.blobToBase64(b); 
                stream.getTracks().forEach(t => t.stop()); 
                window.render(true); 
            };
            
            window.App.studentMediaRecorder.start(); 
            window.App.rec.is = true; 
            window.App.rec.secs = 0; 
            window.render(true);
            
            window.App.rec.int = setInterval(()=>{ 
                window.App.rec.secs++; 
                let tEl = window.getEl('rec-timer-display');
                if (tEl) {
                    tEl.innerText = window.fmtT(window.App.rec.secs);
                } else {
                    window.render(true);
                }
            }, 1000);
        } catch(e) { window.showAlert("Gagal mengakses mikrofon. Pastikan browser diizinkan merekam suara."); }
    };

    window.stopStudentRecord = function() { if(window.App.studentMediaRecorder && window.App.rec.is) { window.App.studentMediaRecorder.stop(); window.App.rec.is = false; clearInterval(window.App.rec.int); window.render(true); } };

    window.render = function() {
      let isForced = arguments[0] === true; let activeEl = document.activeElement; let focusedId = activeEl ? activeEl.id : null; let selStart = 0, selEnd = 0;
      
      let sc = window.getEl('main-scroll'); 
      let sPos = sc ? sc.scrollTop : 0;

      if (focusedId && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) { try { selStart = activeEl.selectionStart; selEnd = activeEl.selectionEnd; } catch(e){} }
      if(window.App.theme==='dark') document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
      
      let pWrap = window.getEl('persistent-player-wrapper');
      
      if (window.App.view === 'player' && pWrap && pWrap.parentNode && pWrap.parentNode.id === 'player-destination' && !isForced && !window.App.modal) {
          window.updatePlayerDOM();
      } else {
          if (pWrap) {
              pWrap.classList.add('hidden');
              pWrap.classList.add('pointer-events-none');
              if (pWrap.parentNode !== document.body) {
                  document.body.appendChild(pWrap);
              }
          }
          
          window.getEl('app-root').innerHTML = window.generateMainHtml();
          
          if(window.App.view === 'player') {

              if (pWrap && pDest) {

                  pWrap.classList.add('absolute', 'inset-0', 'z-0');
                  if (pWrap.parentNode !== pDest) pDest.appendChild(pWrap);
                  if(!window.App.yt) window.initYTPlayer();
              }
              window.updatePlayerDOM();
          }
      }

      let nSc = window.getEl('main-scroll'); 
      if (nSc) nSc.scrollTop = sPos;

      if (focusedId) { let el = document.getElementById(focusedId); if (el) { el.focus(); try { el.setSelectionRange(selStart, selEnd); } catch(e){} } }

e-500 font-bold text-xs md:text-sm hover:text-slate-800 transition">Batal</button></div></div>';

        }

        root.innerHTML = mHtml;
    };

    window.setupSegmentModal = async function() {
        var sur = window.App.surahs.find(s=>s.id===window.App.actSurahId); if(!sur)return;
        var cT = sur.title.replace("Surah ","").trim(); var qD = Q_SURAHS.find(q=>q.name===cT);
        if(qD){
            window.show('segment-loading'); window.hide('sf');
            try{
                var r = await fetch(`https://api.alquran.cloud/v1/surah/${qD.no}/editions/quran-uthmani,id.indonesian`);
                var js = await r.json(); window.App.currentSurahAyatData = js.data;
                var tA = js.data[0].ayahs.length;
                var sS = window.getEl('seg-start-ayat'); var eS = window.getEl('seg-end-ayat');
                
                if(sS && eS) {
                    sS.innerHTML=''; eS.innerHTML='';
                    for(var i=1;i<=tA;i++){sS.innerHTML+='<option value="' + i + '">Ayat ' + i + '</option>';eS.innerHTML+='<option value="' + i + '">Ayat ' + i + '</option>';}
                    if (window.App.modalData) {
                        let sg = window.App.segs.find(x=>x.id===window.App.modalData);
                        if (sg && sg.title.startsWith('Ayat ')) {
                            let nums = sg.title.replace('Ayat ', '').split('-');
                            if (nums.length === 1) { sS.value = nums[0].trim(); eS.value = nums[0].trim(); } 
                            else if (nums.length === 2) { sS.value = nums[0].trim(); eS.value = nums[1].trim(); }
                        }
                    } else {
                        setTimeout(window.autoFillAyat, 50);
                    }
                }
            }catch(e){window.App.currentSurahAyatData=null;}finally{window.hide('segment-loading'); window.show('sf');}
        }
    };
    
    window.autoFillAyat = function() {
        if(!window.App.currentSurahAyatData)return;
        var s=parseInt(window.val('seg-start-ayat')); var e=parseInt(window.val('seg-end-ayat'));
        if(e<s){e=s;window.val('seg-end-ayat',e);}
        
        var sur = window.App.surahs.find(x=>x.id===window.App.actSurahId);
        var isFatihah = sur && sur.title.toLowerCase().includes('al-fatihah');

        var aT=[]; var iT=[];
        for(var i=s;i<=e;i++){
            var id=i-1;
            let arabText = window.App.currentSurahAyatData[0].ayahs[id].text;
            
            if (i === 1 && !isFatihah) {
                let parts = arabText.split('ٱلرَّحِيمِ ');
                if (parts.length > 1) {
                    arabText = parts.slice(1).join('ٱلرَّحِيمِ ');
                } else {
                    arabText = arabText.replace(/^بِسْمِ.+?ٱلرَّحِيمِ ?/, '');
                }
            }

            aT.push(arabText+' ۝'+window.toArabicNumeral(i));
            iT.push('(' + i + ') '+window.App.currentSurahAyatData[1].ayahs[id].text);
        }
        var gt=s===e?'Ayat ' + s:'Ayat ' + s + '-' + e; 
        window.val('st',gt); window.val('sa',aT.join(' ')); window.val('str',iT.join(' '));
    };

  </script>
