  <style type="text/tailwindcss">

  </style>

</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#111c18] dark:text-gray-200 font-sans flex flex-col w-full h-screen overflow-hidden transition-colors duration-300">

  <!-- LAYAR UTAMA -->

  <!-- LAYAR MODAL -->

  <!-- TEMPAT PERMANEN VIDEO YOUTUBE -->
  <div id="persistent-player-wrapper" class="hidden">
      <div id="youtube-player" class="w-full h-full"></div>
  </div>

  <script>
    // --- KEAMANAN & HELPER DOM ---
    window.esc = function(str) {
        if (!str) return '';
        return String(str).replace(/[&<>'"]/g, tag => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[tag] || tag));
    };

    window.getEl = function(id) { return document.getElementById(id); };
    window.hide = function(id) { var e = window.getEl(id); if(e) e.classList.add('hidden'); };
    window.show = function(id) { var e = window.getEl(id); if(e) e.classList.remove('hidden'); };
    window.val = function(id, v) { var e = window.getEl(id); if(!e) return ''; if(v !== undefined) e.value = v; return e.value; };
    window.text = function(id, t) { var e = window.getEl(id); if(e) e.innerText = t; };

    // --- DATA KONSTANTA ---
    const Q_SURAHS = JSON.parse('[{"no":1,"name":"Al-Fatihah","juz":[1]},{"no":2,"name":"Al-Baqarah","juz":[1,2,3]},{"no":3,"name":"Ali \'Imran","juz":[3,4]},{"no":4,"name":"An-Nisa\'","juz":[4,5,6]},{"no":5,"name":"Al-Ma\'idah","juz":[6,7]},{"no":6,"name":"Al-An\'am","juz":[7,8]},{"no":7,"name":"Al-A\'raf","juz":[8,9]},{"no":8,"name":"Al-Anfal","juz":[9,10]},{"no":9,"name":"At-Taubah","juz":[10,11]},{"no":10,"name":"Yunus","juz":[11]},{"no":11,"name":"Hud","juz":[11,12]},{"no":12,"name":"Yusuf","juz":[12,13]},{"no":13,"name":"Ar-Ra\'d","juz":[13]},{"no":14,"name":"Ibrahim","juz":[13]},{"no":15,"name":"Al-Hijr","juz":[14]},{"no":16,"name":"An-Nahl","juz":[14]},{"no":17,"name":"Al-Isra\'","juz":[15]},{"no":18,"name":"Al-Kahf","juz":[15,16]},{"no":19,"name":"Maryam","juz":[16]},{"no":20,"name":"Taha","juz":[16]},{"no":21,"name":"Al-Anbiya\'","juz":[17]},{"no":22,"name":"Al-Hajj","juz":[17]},{"no":23,"name":"Al-Mu\'minun","juz":[18]},{"no":24,"name":"An-Nur","juz":[18]},{"no":25,"name":"Al-Furqan","juz":[18,19]},{"no":26,"name":"Asy-Syu\'ara\'","juz":[19]},{"no":27,"name":"An-Naml","juz":[19,20]},{"no":28,"name":"Al-Qasas","juz":[20]},{"no":29,"name":"Al-\'Ankabut","juz":[20,21]},{"no":30,"name":"Ar-Rum","juz":[21]},{"no":31,"name":"Luqman","juz":[21]},{"no":32,"name":"As-Sajdah","juz":[21]},{"no":33,"name":"Al-Ahzab","juz":[21,22]},{"no":34,"name":"Saba\'","juz":[22]},{"no":35,"name":"Fatir","juz":[22]},{"no":36,"name":"Yasin","juz":[22,23]},{"no":37,"name":"As-Saffat","juz":[23]},{"no":38,"name":"Sad","juz":[23]},{"no":39,"name":"Az-Zumar","juz":[23,24]},{"no":40,"name":"Ghafir","juz":[24]},{"no":41,"name":"Fussilat","juz":[24,25]},{"no":42,"name":"Asy-Syura","juz":[25]},{"no":43,"name":"Az-Zukhruf","juz":[25]},{"no":44,"name":"Ad-Dukhan","juz":[25]},{"no":45,"name":"Al-Jasiyah","juz":[25]},{"no":46,"name":"Al-Ahqaf","juz":[26]},{"no":47,"name":"Muhammad","juz":[26]},{"no":48,"name":"Al-Fath","juz":[26]},{"no":49,"name":"Al-Hujurat","juz":[26]},{"no":50,"name":"Qaf","juz":[26]},{"no":51,"name":"Az-Zariyat","juz":[26,27]},{"no":52,"name":"At-Tur","juz":[27]},{"no":53,"name":"An-Najm","juz":[27]},{"no":54,"name":"Al-Qamar","juz":[27]},{"no":55,"name":"Ar-Rahman","juz":[27]},{"no":56,"name":"Al-Waqi\'ah","juz":[27]},{"no":57,"name":"Al-Hadid","juz":[27]},{"no":58,"name":"Al-Mujadilah","juz":[28]},{"no":59,"name":"Al-Hasyr","juz":[28]},{"no":60,"name":"Al-Mumtahanah","juz":[28]},{"no":61,"name":"As-Saff","juz":[28]},{"no":62,"name":"Al-Jumu\'ah","juz":[28]},{"no":63,"name":"Al-Munafiqun","juz":[28]},{"no":64,"name":"At-Tagabun","juz":[28]},{"no":65,"name":"At-Talaq","juz":[28]},{"no":66,"name":"At-Tahrim","juz":[28]},{"no":67,"name":"Al-Mulk","juz":[29]},{"no":68,"name":"Al-Qalam","juz":[29]},{"no":69,"name":"Al-Haqqah","juz":[29]},{"no":70,"name":"Al-Ma\'arij","juz":[29]},{"no":71,"name":"Nuh","juz":[29]},{"no":72,"name":"Al-Jinn","juz":[29]},{"no":73,"name":"Al-Muzzammil","juz":[29]},{"no":74,"name":"Al-Muddassir","juz":[29]},{"no":75,"name":"Al-Qiyamah","juz":[29]},{"no":76,"name":"Al-Insan","juz":[29]},{"no":77,"name":"Al-Mursalat","juz":[29]},{"no":78,"name":"An-Naba\'","juz":[30]},{"no":79,"name":"An-Nazi\'at","juz":[30]},{"no":80,"name":"\'Abasa","juz":[30]},{"no":81,"name":"At-Takwir","juz":[30]},{"no":82,"name":"Al-Infitar","juz":[30]},{"no":83,"name":"Al-Mutaffifin","juz":[30]},{"no":84,"name":"Al-Insyiqaq","juz":[30]},{"no":85,"name":"Al-Buruj","juz":[30]},{"no":86,"name":"At-Tariq","juz":[30]},{"no":87,"name":"Al-A\'la","juz":[30]},{"no":88,"name":"Al-Gasyiyah","juz":[30]},{"no":89,"name":"Al-Fajr","juz":[30]},{"no":90,"name":"Al-Balad","juz":[30]},{"no":91,"name":"Asy-Syams","juz":[30]},{"no":92,"name":"Al-Lail","juz":[30]},{"no":93,"name":"Ad-Duha","juz":[30]},{"no":94,"name":"Al-Insyirah","juz":[30]},{"no":95,"name":"At-Tin","juz":[30]},{"no":96,"name":"Al-\'Alaq","juz":[30]},{"no":97,"name":"Al-Qadr","juz":[30]},{"no":98,"name":"Al-Bayyinah","juz":[30]},{"no":99,"name":"Az-Zalzalah","juz":[30]},{"no":100,"name":"Al-\'Adiyat","juz":[30]},{"no":101,"name":"Al-Qari\'ah","juz":[30]},{"no":102,"name":"At-Takasur","juz":[30]},{"no":103,"name":"Al-\'Asr","juz":[30]},{"no":104,"name":"Al-Humazah","juz":[30]},{"no":105,"name":"Al-Fil","juz":[30]},{"no":106,"name":"Quraisy","juz":[30]},{"no":107,"name":"Al-Ma\'un","juz":[30]},{"no":108,"name":"Al-Kausar","juz":[30]},{"no":109,"name":"Al-Kafirun","juz":[30]},{"no":110,"name":"An-Nasr","juz":[30]},{"no":111,"name":"Al-Lahab","juz":[30]},{"no":112,"name":"Al-Ikhlas","juz":[30]},{"no":113,"name":"Al-Falaq","juz":[30]},{"no":114,"name":"An-Nas","juz":[30]}]');

    // --- DATA MEMORI ---
    window.App = {
      theme: localStorage.getItem('tahfidzqu_theme') || 'light',
      adminLvl: 0, 
      view: 'home',
      schLogo: localStorage.getItem('tahfidzqu_logo') || '',
      schSub: localStorage.getItem('tahfidzqu_subtitle') || '',
      search: '',
      loginAttempts: 0,
      lockoutTime: 0,
      loginError: '',
      inactivityTimer: null,
      customDialog: { show: false, type: 'alert', message: '', onConfirm: null },
      juzs: [], surahs: [], levels: [], segs: [], ustadz: [], halaqohs: [], siswas: [], subs: [],
      actJuzId: 1, actSurahId: null, actSegId: null,
      yt: null, isPlay: false, repTarget: 7, curRep: 0, speed: 1, interval: null,
      modal: null, modalData: null,
      filter: {u:'all', h:'all', s:'all'},
      hierSel: {u:null, h:null, s:null},
      rec: {is:false, secs:0, int:null, src:'player'},
      resubmitId: null, 
      editingUstadzId: null, editingHalaqohId: null, editingSiswaId: null,
      currentGradingAudioUrl: null, isGradingRecording: false, gradingMediaRecorder: null, gradingAudioChunks: [],
      studentMediaRecorder: null, studentAudioChunks: [], currentStudentAudioUrl: null
    };

    // --- GETTERS ---
    window.fmtT = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    
    // PENYEMPURNAAN GETTER LEVEL AGAR TIDAK UNDEFINED
    window.getLvl = () => {
        var lvls = window.App.levels.filter(l=>l.surahId===window.App.actSurahId);
        var activeLvl = lvls.find(l=>l.active);
        if (activeLvl) return activeLvl.id;
        return lvls.length > 0 ? lvls[0].id : null;
    };
    
    window.getSgs = () => window.App.segs.filter(s=>s.surahId===window.App.actSurahId&&s.levelId===window.getLvl()).sort((a,b)=>a.start-b.start);
    window.getActSeg = () => { var s=window.getSgs(); if(s.length===0)return null; return s.find(x=>x.id===window.App.actSegId)||s[0]; };
    window.getUName = id => window.esc(window.App.ustadz.find(x=>x.id==id)?.name||"-");
    window.getHName = id => window.esc(window.App.halaqohs.find(x=>x.id==id)?.name||"-");
    window.getSName = id => window.esc(window.App.siswas.find(x=>x.id==id)?.name||"-");
    window.getSKelas = id => window.esc(window.App.siswas.find(x=>x.id==id)?.kelas||"-");
    window.toArabicNumeral = en => (""+en).replace(/[0-9]/g, t=>String.fromCharCode(t.charCodeAt(0)+1584));
    window.extractVideoId = url => { if(!url)return null; var m=url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/); return (m&&m[2].length===11)?m[2]:null; };

    // --- NAVIGASI PINTAR & AUTO-LOGOUT ---
    window.switchView = function(viewTarget) {
      window.App.search = ''; 
      window.App.view = viewTarget;
      window.render(true); // Paksa gambar ulang layar
    };

    window.resetTimer = function() {
        clearTimeout(window.App.inactivityTimer);
        if (window.App.adminLvl > 0) {
            window.App.inactivityTimer = setTimeout(() => {
                window.App.adminLvl = 0;
                window.showAlert("Sesi keamanan Anda telah habis (15 menit tidak ada aktivitas). Anda otomatis dikeluarkan.");
                window.switchView('home');
            }, 15 * 60 * 1000);
        }
    };
    document.onmousemove = window.resetTimer;
    document.onkeypress = window.resetTimer;
    document.ontouchstart = window.resetTimer;

    // --- POP-UP MODAL CUSTOM ---
    window.showAlert = function(msg) {
        window.App.customDialog = { show: true, type: 'alert', message: msg, onConfirm: null };
        window.render();
    };

    window.showConfirm = function(msg, cb) {
        window.App.customDialog = { show: true, type: 'confirm', message: msg, onConfirm: cb };
        window.render();
    };

    window.closeDialog = function() {
        window.App.customDialog.show = false;
        window.render();
    };

    // --- KONTROL VIDEO (DOM UPDATE BEDAH) ---
    window.selectSeg = function(id) {
        window.App.actSegId = id;
        window.App.curRep = 0;
        let sgs = window.App.segs.filter(s=>s.surahId===window.App.actSurahId).sort((a,b)=>a.start-b.start);
        let sg = sgs.find(x => x.id === id);
        if(!sg) return;

        if(window.App.yt && typeof window.App.yt.seekTo === 'function') {
            window.App.yt.seekTo(sg.start);
            window.App.yt.playVideo();
            window.App.isPlay = true;
        }
        
        window.updatePlayerDOM();
        
        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-pause text-2xl lg:text-3xl hover:text-emerald-400"></i>';
        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-100', 'scale-95'); bigBtn.classList.replace('opacity-100', 'opacity-0'); }
        let rt = window.getEl('rep-text'); if(rt) rt.innerText = '';
    };

    window.toggleYTPlay = function() {
        if(window.App.yt && typeof window.App.yt.playVideo === 'function') {
            if(window.App.isPlay) {
                window.App.yt.pauseVideo();
            } else {
                let sgs = window.App.segs.filter(s=>s.surahId===window.App.actSurahId).sort((a,b)=>a.start-b.start);
                let cSg = sgs.find(x => x.id === window.App.actSegId);
                let t = window.App.yt.getCurrentTime();
                if(t < (cSg?.start||0) || t >= (cSg?.end||100)) {
                    window.App.yt.seekTo(cSg?.start||0);
                    window.App.curRep = 0;
                    let rt = window.getEl('rep-text'); if(rt) rt.innerText = '';
                }
                window.App.yt.playVideo();
            }
        }
    };

    window.nextSeg = function(dir) {
        let sgs = window.App.segs.filter(s=>s.surahId===window.App.actSurahId).sort((a,b)=>a.start-b.start);
        let idx = sgs.findIndex(x => x.id === window.App.actSegId);
        if(dir === 1 && idx >= 0 && idx < sgs.length - 1) window.selectSeg(sgs[idx+1].id);
        else if (dir === -1 && idx > 0) window.selectSeg(sgs[idx-1].id);
    };

    window.updateRepTarget = function(delta) {
        window.App.repTarget = Math.max(1, window.App.repTarget + delta);
        let el = window.getEl('rep-target-val');
        if(el) el.innerText = window.App.repTarget + 'x';
    };

    window.updateSpeed = function(delta) {
        window.App.speed = Math.max(0.25, Math.min(2, window.App.speed + delta));
        let el = window.getEl('speed-val');
        if(el) el.innerText = window.App.speed + 'x';
        if(window.App.yt && typeof window.App.yt.setPlaybackRate === 'function') {
            window.App.yt.setPlaybackRate(window.App.speed);
        }
    };

    window.openSurah = function(surahId, videoId) {
        window.App.actSurahId = surahId;
        window.App.actSegId = null;

        if(!window.App.levels.some(l => l.surahId == surahId)){
            let nid = Date.now(); 
            let newLvl = {id:nid, surahId:surahId, name:'Level 1', active:true};
            window.App.levels.push(newLvl); 
            if(window.dbSave) window.dbSave('levels', nid, newLvl);
        } else if(!window.App.levels.some(l => l.surahId == surahId && l.active)){
            let m = window.App.levels.find(l => l.surahId == surahId);
            if(m){ m.active = true; if(window.dbSave) window.dbSave('levels', m.id, m); }
        }
        
        window.switchView('player');
    };

    // --- INISIALISASI YOUTUBE ---
    window.initYTPlayer = function() {
        if(!window.YT || !window.YT.Player) return;
        var sur = window.App.surahs.find(s=>s.id===window.App.actSurahId);
        
        if (window.App.yt && typeof window.App.yt.destroy === 'function') {
            try { window.App.yt.destroy(); } catch(e){}
        }

        window.App.yt = new window.YT.Player('youtube-player', {
            host: 'https://www.youtube-nocookie.com', 
            videoId: sur?.videoId||'', 
            playerVars: { controls:0, disablekb:1, rel:0, modestbranding:1, playsinline:1 },
            events: {
                onReady: e => {
                    e.target.setPlaybackRate(window.App.speed);
                },
                onStateChange: e => {
                    if(e.data===window.YT.PlayerState.PLAYING){
                        window.App.isPlay=true;
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-pause text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-100', 'scale-95'); bigBtn.classList.replace('opacity-100', 'opacity-0'); }
                    }
                    else if(e.data===window.YT.PlayerState.PAUSED||e.data===window.YT.PlayerState.ENDED){
                        window.App.isPlay=false;
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-play text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-95', 'scale-100'); bigBtn.classList.replace('opacity-0', 'opacity-100'); }
                    }
                },
                onError: e => {
                    window.App.isPlay=false;
                    console.error("YouTube Error", e);
                }
            }
        });
    };

    window.onYouTubeIframeAPIReady = function() {
        if (window.App && window.App.view === 'player') window.initYTPlayer();
    };

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);


    // --- LOGO & SEKOLAH FUNCTIONS ---
    window.handleLogoUpload = function(e) {
      var f = e.target.files[0];
      if (f) {
        if(f.size > 102400) { window.showAlert("Ukuran file terlalu besar! (Maks 100KB)"); e.target.value = ''; return; }
        var r = new FileReader();
        r.onload = function(ev) {
          try {
            window.App.schLogo = ev.target.result;
            localStorage.setItem('tahfidzqu_logo', window.App.schLogo);
            window.render(true);
          } catch(err) { window.showAlert("Gagal menyimpan logo."); }
        };
        r.readAsDataURL(f);
      }
    };
    window.removeLogo = function() {
      window.App.schLogo = '';
      try { localStorage.removeItem('tahfidzqu_logo'); } catch(e){}
      window.render(true);
    };
    window.saveSchoolSubtitle = function() {
      var input = window.getEl('i-sub');
      if (input) {
        window.App.schSub = window.esc(input.value.trim());
        try { localStorage.setItem('tahfidzqu_subtitle', window.App.schSub); } catch(e){}
        window.render(true);
      }
    };

    // --- FITUR LOGIN ADMIN ---
    window.handleAdminLogin = function() {
        const u = document.getElementById('m_u').value.trim();
        const p = document.getElementById('m_p').value.trim();

        if (Date.now() < window.App.lockoutTime) {
            let remain = Math.ceil((window.App.lockoutTime - Date.now()) / 1000);
            window.App.loginError = `Akses Terkunci! Tunggu ${remain} detik.`;
            window.render(); return;
        }
        if(u === 'jayyidin' && p === 'offthewallba123') {
            window.App.adminLvl = 1; window.App.modal = null; window.App.loginError = ''; window.App.loginAttempts = 0; window.resetTimer(); window.switchView('admin'); 
        } else {
            let ust = window.App.ustadz.find(x => x.username === u && x.password === p);
            if(ust) {
                window.App.adminLvl = 2; window.App.modal = null; window.App.loginError = ''; window.App.loginAttempts = 0; window.resetTimer(); window.switchView('admin');
            } else {
                window.App.loginAttempts++;
                if (window.App.loginAttempts >= 3) {
                    window.App.lockoutTime = Date.now() + 30000;
                    window.App.loginError = 'Akun terkunci sementara karena gagal 3 kali berturut-turut.';
                } else {
                    window.App.loginError = `Username atau Password salah! (Sisa percobaan: ${3 - window.App.loginAttempts})`;
                }
                window.render();
            }
        }
    };

    window.blobToBase64 = function(blob) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    };

    // --- FITUR REKAMAN SANTRI CLOUD ---
    window.startStudentRecord = async function() {
        try {
            var stream = await navigator.mediaDevices.getUserMedia({audio: true});
            window.App.studentMediaRecorder = new MediaRecorder(stream);
            window.App.studentAudioChunks = [];
            window.App.studentMediaRecorder.ondataavailable = e => { if(e.data.size > 0) window.App.studentAudioChunks.push(e.data); };
            window.App.studentMediaRecorder.onstop = async () => {
                var b = new Blob(window.App.studentAudioChunks, { type: 'audio/webm' });
                window.App.currentStudentAudioUrl = await window.blobToBase64(b);
                stream.getTracks().forEach(t => t.stop());
                window.render(true);
            };
            window.App.studentMediaRecorder.start();
            window.App.rec.is = true;
            window.App.rec.secs = 0;
            window.App.rec.int = setInterval(()=>{ window.App.rec.secs++; window.render(true); }, 1000);
            window.render(true);
        } catch(e) {
            window.showAlert("Gagal mengakses mikrofon. Pastikan browser diizinkan merekam suara.");
        }
    };

    window.stopStudentRecord = function() {
        if(window.App.studentMediaRecorder && window.App.rec.is) {
            window.App.studentMediaRecorder.stop();
            window.App.rec.is = false;
            clearInterval(window.App.rec.int);
            window.render(true);
        }
    };

    window.submitRec = async function(type, evt=null) { 
        if(!window.App.hierSel.s) { 
            if(evt) evt.target.value=''; 
            window.showAlert('Pilih identitas santri terlebih dahulu!'); 
            return; 
        }
        var mediaType = type === 'mic' ? 'rekaman mic' : 'file audio';
        var tDate = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
        let audioData = window.App.currentStudentAudioUrl;

        if(type === 'file' && evt && evt.target.files[0]) {
            audioData = await window.blobToBase64(evt.target.files[0]);
        }
        
        if (window.App.resubmitId) {
            var existingSub = window.App.subs.find(x => x.id === window.App.resubmitId);
            if (existingSub) {
                existingSub.status = 'pending';
                existingSub.type = mediaType;
                existingSub.date = tDate;
                existingSub.audioUrl = audioData;
                if(window.dbSave) await window.dbSave('subs', existingSub.id, existingSub);
            }
            window.App.resubmitId = null;
        } else {
            let nid = Date.now();
            if(window.dbSave) await window.dbSave('subs', nid, {
                id: nid, siswaId: Number(window.App.hierSel.s), halaqohId: Number(window.App.hierSel.h), ustadzId: Number(window.App.hierSel.u),
                surahId: window.App.actSurahId, segmentId: window.App.actSegId, type: mediaType, date: tDate,
                status: 'pending', grade: null, note: null, audioUrl: audioData
            });
        }
        
        window.App.currentStudentAudioUrl = null;
        if(window.App.rec.is){clearInterval(window.App.rec.int);window.App.rec.is=false;} 
        window.App.rec.secs = 0;
        
        window.switchView(window.App.rec.src);
        window.showAlert('Setoran Berhasil Terkirim ke Cloud!'); 
    };

    // --- FITUR PENILAIAN & PENGHAPUSAN ---
    window.submitGrade = async function(id, grade) {
        let sub = window.App.subs.find(x => x.id == id);
        if(sub) {
            sub.status = grade === 'repeat' ? 'need-repeat' : 'graded';
            sub.grade = grade === 'repeat' ? null : grade;
            sub.note = window.esc(window.val('gn'));
            sub.voiceNote = window.App.currentGradingAudioUrl;
            if(window.dbSave) await window.dbSave('subs', id, sub);
        }
        window.App.currentGradingAudioUrl = null; 
        window.App.modal = null; 
        window.render(true);
    };

    window.toggleGradingRecord = async function() {
        if(window.App.isGradingRecording) {
            window.App.gradingMediaRecorder.stop(); 
            window.App.isGradingRecording=false;
            window.render();
        } else {
            try {
                var s = await navigator.mediaDevices.getUserMedia({audio:true});
                window.App.gradingMediaRecorder = new MediaRecorder(s); 
                window.App.gradingAudioChunks = [];
                window.App.gradingMediaRecorder.ondataavailable = e => {if(e.data.size>0)window.App.gradingAudioChunks.push(e.data);};
                window.App.gradingMediaRecorder.onstop = async () => {
                    var b = new Blob(window.App.gradingAudioChunks,{type:'audio/webm'});
                    window.App.currentGradingAudioUrl = await window.blobToBase64(b);
                    window.render(); 
                    s.getTracks().forEach(t=>t.stop());
                };
                window.App.gradingMediaRecorder.start(); 
                window.App.isGradingRecording = true;
                window.render();
            } catch(e) { window.showAlert("Akses mikrofon ditolak oleh browser."); }
        }
    };

        window.App.currentGradingAudioUrl = null;

            if (type === 'surah') window.dbDelete('surahs', id);
            if (type === 'level') window.dbDelete('levels', id);
            if (type === 'segment') window.dbDelete('segs', id);
            if (type === 'ustadz') { window.dbDelete('ustadz', id); if(window.App.hierSel.u == id){window.App.hierSel.u=null;window.App.hierSel.h=null;} }
            if (type === 'halaqoh') { window.dbDelete('halaqohs', id); if(window.App.hierSel.h == id){window.App.hierSel.h=null;} }

    window.setupSegmentModal = async function() {
        var sur = window.App.surahs.find(s=>s.id===window.App.actSurahId); if(!sur)return;
        var cT = sur.title.replace("Surah ","").trim(); var qD = Q_SURAHS.find(q=>q.name===cT);
        if(qD){
            window.show('segment-loading'); window.hide('sf');
            try{
                var r = await fetch(`https://api.alquran.cloud/v1/surah/${qD.no}/editions/quran-uthmani,id.indonesian`);
                var js = await r.json(); window.App.currentSurahAyatData = js.data;
                var tA = js.data[0].ayahs.length;
                var sS = window.getEl('seg-start-ayat'); var eS = window.getEl('seg-end-ayat');
                
                if(sS && eS) {
                    sS.innerHTML=''; eS.innerHTML='';
                    for(var i=1;i<=tA;i++){sS.innerHTML+=`<option value="${i}">Ayat ${i}</option>`;eS.innerHTML+=`<option value="${i}">Ayat ${i}</option>`;}
                    if (window.App.modalData) {
                        let sg = window.App.segs.find(x=>x.id===window.App.modalData);
                        if (sg && sg.title.startsWith('Ayat ')) {
                            let nums = sg.title.replace('Ayat ', '').split('-');
                            if (nums.length === 1) { sS.value = nums[0].trim(); eS.value = nums[0].trim(); } 
                            else if (nums.length === 2) { sS.value = nums[0].trim(); eS.value = nums[1].trim(); }
                        }
                    } else {
                        setTimeout(window.autoFillAyat, 50);
                    }
                }
            }catch(e){window.App.currentSurahAyatData=null;}finally{window.hide('segment-loading'); window.show('sf');}
        }
    };
    
    window.autoFillAyat = function() {
        if(!window.App.currentSurahAyatData)return;
        var s=parseInt(window.val('seg-start-ayat')); var e=parseInt(window.val('seg-end-ayat'));
        if(e<s){e=s;window.val('seg-end-ayat',e);}
        var aT=[]; var iT=[];
        for(var i=s;i<=e;i++){var id=i-1;aT.push(window.App.currentSurahAyatData[0].ayahs[id].text+' ۝'+window.toArabicNumeral(i));iT.push(`(${i}) `+window.App.currentSurahAyatData[1].ayahs[id].text);}
        var gt=s===e?`Ayat ${s}`:`Ayat ${s}-${e}`; 
        window.val('st',gt); window.val('sa',aT.join(' ')); window.val('str',iT.join(' '));
    };

    const safeAppId = rawAppId.replace(/[.#$\[\]]/g, '_');
    
    const fApp = initializeApp(firebaseConfig);
    const auth = getAuth(fApp);
    const db = getDatabase(fApp);
    let fbUser = null;

    window.dbSave = async function(col, id, data) {
       if(!fbUser) { window.showAlert('Gagal menyimpan. Tidak terhubung ke Cloud.'); return; }
       try { await set(ref(db, `artifacts/${safeAppId}/public/data/${col}/${id}`), data); } 
       catch(e) { console.error(e); window.showAlert('Error Cloud: '+e.message); }
    };

    window.dbDelete = async function(col, id) {
       if(!fbUser) { window.showAlert('Gagal menghapus. Tidak terhubung ke Cloud.'); return; }
       try { await remove(ref(db, `artifacts/${safeAppId}/public/data/${col}/${id}`)); } 
       catch(e) { console.error(e); window.showAlert('Error Cloud: '+e.message); }
    };

    window.render(true); // Initial Render Loading

    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (e) { console.error('Auth fail:', e); }
    };
    initAuth();

    onAuthStateChanged(auth, (u) => {
       fbUser = u;
       if(u) {
          const cols = ['juzs', 'surahs', 'levels', 'segs', 'ustadz', 'halaqohs', 'siswas', 'subs'];
          cols.forEach(c => {
             onValue(ref(db, `artifacts/${safeAppId}/public/data/${c}`), (snapshot) => {
                const dataObj = snapshot.val();
                window.App[c] = dataObj ? Object.keys(dataObj).map(key => ({
                    id: isNaN(key) ? key : Number(key), 
                    ...dataObj[key]
                })) : [];
                window.render(); // Aman dipanggil berkali-kali karena fitur bedah DOM
             }, (error) => { console.error("Izin Ditolak/Error:", error); });
          });

          // Memulai Loop Timer Video
          setInterval(function() {
            if (window.App.view === 'player' && window.App.isPlay && window.App.yt && typeof window.App.yt.getCurrentTime === 'function' && window.App.actSurahId) {
                var t = window.App.yt.getCurrentTime(); var sg = window.getActSeg();
                if (!sg) { 
                    if(typeof window.App.yt.pauseVideo==='function')window.App.yt.pauseVideo(); 
                    window.App.isPlay = false; 
                    if(window.getEl('time-display')) window.text('time-display', '00:00 / 00:00'); 
                    if(window.getEl('current-time-indicator'))window.getEl('current-time-indicator').style.left = '0%'; 
                    return; 
                }
                
                if(window.getEl('time-display')) window.text('time-display', `${window.fmtT(t)} / ${window.fmtT(sg.end)}`);
                var as = window.getSgs(); var td = as.length > 0 ? as[as.length-1].end : 200;
                var pct = Math.min(100, (t / td) * 100);
                var ind = window.getEl('current-time-indicator');
                if(ind) ind.style.left = `${pct}%`;

                if (t >= sg.end) { 
                    if (window.App.curRep + 1 < window.App.repTarget) { 
                        if(typeof window.App.yt.seekTo==='function')window.App.yt.seekTo(sg.start); 
                        window.App.curRep++; 
                        let rt = window.getEl('rep-text'); if(rt) rt.innerText = `(Ke-${window.App.curRep+1})`;
                    } else { 
                        if(typeof window.App.yt.pauseVideo==='function')window.App.yt.pauseVideo(); 
                        window.App.isPlay = false; 
                        window.App.curRep = 0; 
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-play text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-95', 'scale-100'); bigBtn.classList.replace('opacity-0', 'opacity-100'); }
                        let rt = window.getEl('rep-text'); if(rt) rt.innerText = '';
                    } 
                }
            }
          }, 200);
       }
    });
  </script>
</body>
</html>
