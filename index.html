          const calculatePoints = (surahNum, rangeStr) => {
              if (surahNum === 1) return 0;
              const surah = SURAH_LIST.find(s => s.number === surahNum);
              if (!surah) return 0;
              let readAyahs = surah.ayahs;
              if (rangeStr) {
                  const matches = rangeStr.match(/\d+/g);
                  if (matches && matches.length >= 2) readAyahs = Math.abs(parseInt(matches[1]) - parseInt(matches[0])) + 1;
                  else if (matches && matches.length === 1) readAyahs = 1;
              }
              if (surahNum >= 78) return readAyahs > 11 ? 2 : 1;

                      badgeRounded = "rounded-lg";
                      badgeInnerGap = "gap-1";
                  } else if (studentCount > 8) {
                      dynamicGap = "gap-1.5";
                      badgePadding = "px-2.5 py-1";
                      badgeText = "text-[10px]";
                      dotSize = "w-1.5 h-1.5";
                      badgeRounded = "rounded-xl";
                      badgeInnerGap = "gap-1.5";
                  }

                  return (
                      <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-in fade-in">
                          <div className="w-full max-w-sm flex flex-col items-center">
                              <div className="max-w-full overflow-x-auto pb-4 custom-scrollbar">
                                  <div ref={shareDailyCardRef} className="bg-white rounded-none p-6 text-slate-800 relative overflow-hidden flex flex-col items-center text-center mx-auto border border-slate-200 shadow-2xl" style={{ width: '315px', height: '560px', boxSizing: 'border-box', flexShrink: 0, fontFamily: "'Inter', sans-serif" }}>
                                      
                                      <div className="absolute inset-0 z-0 bg-gradient-to-br from-orange-50 via-white to-orange-100 overflow-hidden">
                                          <div className="absolute -top-24 -right-24 w-64 h-64 bg-orange-300/30 rounded-full blur-3xl"></div>
                                          <div className="absolute bottom-0 -left-12 w-48 h-48 bg-yellow-400/20 rounded-full blur-2xl"></div>
                                      </div>

                                      <div className="relative z-10 flex flex-col items-center text-center w-full h-full">
                                          <img src={schoolLogo || "./logo.png"} onError={(e) => { e.target.style.display = 'none'; }} alt="Logo" className="h-6 max-w-[80%] mb-4 object-contain drop-shadow-sm" />
                                          <h3 className="text-2xl font-extrabold text-orange-600 leading-tight mb-1">Rekap Murojaah</h3>
                                          <p className="text-[10px] font-bold tracking-widest text-slate-500 uppercase mb-5">{schoolName}</p>
                                          
                                          <div className="bg-orange-500/10 px-5 py-2 rounded-2xl border border-orange-500/20 mb-4 shadow-sm w-full">
                                              <p className="text-sm font-extrabold text-orange-700 truncate">{shareDailyItem.halaqohName}</p>
                                              <p className="text-[10px] font-bold text-orange-600 uppercase tracking-wide truncate">{shareDailyItem.ustadzName}</p>
                                          </div>
                                          
                                          <p className="text-xs font-extrabold text-slate-700 bg-white/80 backdrop-blur-sm px-4 py-2 rounded-xl border border-slate-200 shadow-sm mb-5">
                                              {new Date(shareDailyItem.dateStr).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                          </p>

                                          <p className="text-[11px] font-bold text-slate-600 italic mb-4 px-2 leading-relaxed">
                                            "Barakallahu fiikum karena telah murojaah hari ini:"
                                          </p>
                                          
                                          <div className="w-full flex-1 flex flex-col overflow-hidden mb-4 relative">
                                              <div className="absolute top-0 left-0 w-full h-4 bg-gradient-to-b from-white to-transparent z-10 pointer-events-none"></div>
                                              <div className="absolute bottom-0 left-0 w-full h-4 bg-gradient-to-t from-white to-transparent z-10 pointer-events-none"></div>
                                              
                                              {/* Menggunakan content-center agar jika banyak otomatis ke tengah tanpa scroll */}
                                              <div className={`flex flex-wrap justify-center content-center ${dynamicGap} overflow-hidden pt-2 pb-4 h-full relative z-0`}>
                                                  {shareDailyItem.students.length > 0 ? (
                                                      shareDailyItem.students.map((siswa, index) => (
                                                          <span key={index} className={`bg-white text-slate-800 ${badgePadding} ${badgeRounded} ${badgeText} font-extrabold border border-slate-200 shadow-sm flex items-center ${badgeInnerGap}`}>
                                                              <span className={`${dotSize} rounded-full bg-green-500 flex-shrink-0`}></span>
                                                              {siswa}
                                                          </span>
                                                      ))
                                                  ) : (
                                                      <div className="w-full flex items-center justify-center h-full opacity-60">
                                                          <span className="text-[10px] font-bold text-slate-500 italic px-4 py-2 border-2 border-slate-200 border-dashed rounded-xl">Belum ada santri yang murojaah hari ini.</span>
                                                      </div>
                                                  )}
                                              </div>
                                          </div>

                                          <div className="w-full text-center text-slate-500 border-t border-slate-200 pt-3 pb-1 mt-auto px-1 overflow-hidden">
                                              <p className="text-[8.5px] italic font-bold tracking-tight whitespace-nowrap truncate w-full">"Membangun Generasi Qurani dan Pemimpin Masa Depan"</p>
                                          </div>
                                      </div>
                                  </div>
                              </div>
                              <div className="flex gap-2 mt-4 w-full max-w-[315px]">
                                  <button onClick={() => setShareDailyItem(null)} className="flex-[0.8] py-3 bg-white/10 hover:bg-white/20 text-white rounded-2xl font-bold transition-colors text-sm">Tutup</button>
                                  <button onClick={() => processImageGeneric('download', shareDailyCardRef, 'Rekap_Harian', shareDailyItem.halaqohName)} disabled={!!isGeneratingImage} className="flex-[1.2] py-3 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-700 transition-colors shadow-lg flex items-center justify-center gap-1.5 text-sm border border-slate-700">{isGeneratingImage === 'download' ? <Loader2 className="w-4 h-4 sm:w-5 sm:h-5 animate-spin" /> : <Download className="w-4 h-4 sm:w-5 sm:h-5" />} Unduh</button>
                                  <button onClick={() => processImageGeneric('share', shareDailyCardRef, 'Rekap_Harian', shareDailyItem.halaqohName)} disabled={!!isGeneratingImage} className="flex-[1.2] py-3 bg-white text-blue-600 rounded-2xl font-bold hover:bg-blue-50 transition-colors shadow-lg flex items-center justify-center gap-1.5 text-sm">{isGeneratingImage === 'share' ? <Loader2 className="w-4 h-4 sm:w-5 sm:h-5 animate-spin" /> : <Share2 className="w-4 h-4 sm:w-5 sm:h-5" />} Share</button>
                              </div>
                          </div>
                      </div>
                  );
              })()}

              {showConfetti && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/40 backdrop-blur-sm animate-in fade-in duration-300">
                   <div className="bg-white p-8 sm:p-10 rounded-[3rem] shadow-2xl text-center transform scale-110 mx-4 border border-slate-100">
                      <div className="w-20 h-20 sm:w-24 sm:h-24 bg-gradient-to-br from-orange-100 to-orange-50 rounded-[2rem] flex items-center justify-center mx-auto mb-5 sm:mb-6 shadow-inner"><BookOpen className="text-orange-600 animate-bounce w-10 h-10 sm:w-12 sm:h-12" /></div>
                      <h3 className="text-2xl sm:text-3xl font-extrabold mb-2 italic text-slate-800">Alhamdulillah!</h3>
                      <p className="text-sm sm:text-base font-medium text-slate-500">Data hafalan telah tersimpan.</p>
                   </div>
                </div>
              )}

              {currentView !== 'welcome' && (
                 <footer className="fixed bottom-0 left-0 right-0 z-50 w-full text-center py-3 sm:py-4 text-slate-400 text-[10px] sm:text-xs font-medium px-4 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-orange-100 dark:border-slate-800 flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <span>&copy; {new Date().getFullYear()} Juman Jayyidin.</span>
                    <span className="hidden sm:inline">|</span>
                    <span>All rights reserved.</span>
                 </footer>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    </script>
</body>
</html>
