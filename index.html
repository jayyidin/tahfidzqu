    window.esc = function(str) {
        if (!str) return '';
        return String(str).replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
    };

    window.getEl = function(id) { return document.getElementById(id); };
    window.hide = function(id) { var e = window.getEl(id); if(e) e.classList.add('hidden'); };
    window.show = function(id) { var e = window.getEl(id); if(e) e.classList.remove('hidden'); };
    window.val = function(id, v) { var e = window.getEl(id); if(!e) return ''; if(v !== undefined) e.value = v; return e.value; };
    window.text = function(id, t) { var e = window.getEl(id); if(e) e.innerText = t; };

    window.fixAudio = function(el) {
        if (el.dataset.fixed === "true") return;
        let doFix = function() {
            if (el.dataset.fixed === "true") return;
            el.dataset.fixed = "true"; 
            let m = el.muted;
            el.muted = true; 
            let onSeeked = function() {
                el.removeEventListener('seeked', onSeeked);
                el.currentTime = 0; 
                setTimeout(() => { el.muted = m; }, 50); 
            };
            el.addEventListener('seeked', onSeeked);
            el.currentTime = 1e8; 
        };
        el.addEventListener('play', doFix);
        if (el.readyState >= 1) { doFix(); }
    };

    // Fitur Flash Kamera untuk Efek Screenshot Murni
    window.simulateScreenshot = function() {
        let f = document.createElement('div');
        f.style.position = 'fixed';
        f.style.top = '0'; f.style.left = '0';
        f.style.width = '100vw'; f.style.height = '100vh';
        f.style.backgroundColor = '#ffffff';
        f.style.zIndex = '999999';
        f.style.opacity = '0.9';
        f.style.transition = 'opacity 0.4s ease-out';
        document.body.appendChild(f);
        
        try {
            let a = new Audio('https://actions.google.com/sounds/v1/ui/camera_shutter.ogg');
            a.volume = 0.5;
            a.play().catch(e=>{});
        } catch(err){}

        setTimeout(() => { f.style.opacity = '0'; }, 50);
        setTimeout(() => { if(f.parentNode) f.parentNode.removeChild(f); }, 500);
    };

    // Fungsi Share & Download Menggunakan Metode Terkuat MyQuranPlan
    window.downloadCard = function() {
        let node = document.getElementById('achievement-card-node');
        let btn = document.getElementById('btn-download-card');
        if(!node || !window.domtoimage) return;
        
        let oldHtml = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i> Menyimpan...';
        btn.disabled = true;

        window.simulateScreenshot();

        setTimeout(() => {
            const scale = 3;
            // PAKSA DIMENSI 360x500 AGAR TEKS TIDAK KEPOTONG / GEPENG
            domtoimage.toPng(node, { 
                bgcolor: '#ffffff',
                width: 360 * scale,
                height: 500 * scale,
                style: {
                    transform: 'scale(' + scale + ')',
                    transformOrigin: 'top left',
                    width: '360px',
                    height: '500px',
                    margin: '0'
                }
            })
            .then(function (dataUrl) {
                let link = document.createElement('a');
                link.download = 'Syahadah_TahfidzQu.png';
                link.href = dataUrl;
                link.click();
                btn.innerHTML = oldHtml;
                btn.disabled = false;
            })
            .catch(function (error) {
                window.showAlert('Gagal screenshot kartu. ' + error);
                btn.innerHTML = oldHtml;
                btn.disabled = false;
            });
        }, 150);
    };

    window.shareCard = function() {
        let node = document.getElementById('achievement-card-node');
        let btn = document.getElementById('btn-share-card');
        if(!node || !window.domtoimage) return;

        let oldHtml = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i> Memproses...';
        btn.disabled = true;

        window.simulateScreenshot();

        setTimeout(() => {
            const scale = 3;
            domtoimage.toPng(node, { 
                bgcolor: '#ffffff',
                width: 360 * scale,
                height: 500 * scale,
                style: {
                    transform: 'scale(' + scale + ')',
                    transformOrigin: 'top left',
                    width: '360px',
                    height: '500px',
                    margin: '0'
                }
            })
            .then(async function (dataUrl) {
                try {
                    let blob = await (await fetch(dataUrl)).blob();
                    let file = new File([blob], 'Syahadah_TahfidzQu.png', { type: 'image/png' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'Syahadah Tahfidz',
                            text: 'Alhamdulillah, pencapaian hafalan baru!',
                            files: [file]
                        });
                    } else {
                        window.showAlert('Perangkat ini tidak mendukung fitur Share gambar langsung. Silakan Download gambarnya terlebih dahulu.');
                    }
                } catch (e) {
                    if (e && e.name !== 'AbortError') {
                        window.showAlert('Gagal membagikan kartu. Coba gunakan fitur Download.');
                    }
                }
                btn.innerHTML = oldHtml;
                btn.disabled = false;
            })
            .catch(function (error) {
                window.showAlert('Gagal memproses kartu. ' + error);
                btn.innerHTML = oldHtml;
                btn.disabled = false;
            });
        }, 150);
    };

    window.fmtT = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    
    if (!window.App.audioObj) {
        window.App.audioObj = new Audio();
        
        window.App.audioObj.addEventListener('timeupdate', () => {
            let id = window.App.activeAudioId;
            if(!id) return;
            
            let elTime = window.getEl('audio-time-' + id);
            let elBar = window.getEl('audio-bar-' + id);
            let a = window.App.audioObj;
            
            let ct = a.currentTime;
            if (!ct || isNaN(ct)) ct = 0;
            
            if(elTime) elTime.innerText = window.fmtT(ct); 
            
            if(elBar) {
                let d = window.App.activeAudioDur || a.duration;
                if (!d || isNaN(d) || d === Infinity || d <= 0) d = Math.max(10, ct + 2);
                let pct = Math.min(100, (ct / d) * 100);
                elBar.style.width = pct + '%';
            }
        });
        
        window.App.audioObj.addEventListener('ended', () => {
            let id = window.App.activeAudioId;
            if(!id) return;
            let isUstadz = id.includes('_ust_') || id === 'grade_modal';
            let btn = window.getEl('audio-btn-' + id);

            window.App.activeAudioId = null;
        });

    window.playCustomAudio = function(id, url, savedDuration) {
        if (!window.App.audioObj) return;
        let a = window.App.audioObj;
        let isUstadz = id.includes('_ust_') || id === 'grade_modal';
        let getIcon = (state) => `<i class="ph-fill ${state === 'play' ? 'ph-play' : 'ph-pause'} ${isUstadz ? 'text-xs' : 'text-sm'}"></i>`;

        if (window.App.activeAudioId === id) {
            if (a.paused) { 
                a.play(); 
                let btn = window.getEl('audio-btn-' + id);
                if(btn) btn.innerHTML = getIcon('pause'); 
            } else { 
                a.pause(); 
                let btn = window.getEl('audio-btn-' + id);
                if(btn) btn.innerHTML = getIcon('play'); 
            }
            return;
        }
        
        if (window.App.activeAudioId) {
            let oldIsUst = window.App.activeAudioId.includes('_ust_') || window.App.activeAudioId === 'grade_modal';
            let oldBtn = window.getEl('audio-btn-' + window.App.activeAudioId);
            if(oldBtn) oldBtn.innerHTML = `<i class="ph-fill ph-play ${oldIsUst ? 'text-xs' : 'text-sm'}"></i>`;
            let oldBar = window.getEl('audio-bar-' + window.App.activeAudioId);
            if(oldBar) oldBar.style.width = '0%';
            let oldTime = window.getEl('audio-time-' + window.App.activeAudioId);
            if(oldTime) oldTime.innerText = '00:00';
        }
        
        window.App.activeAudioId = id;
        window.App.activeAudioDur = savedDuration;
        a.src = url;
        a.play().catch(e => {
            window.showAlert('Tidak dapat memutar rekaman. Browser butuh interaksi.');

    window.initYTPlayer = function() {
        if(!window.YT || !window.YT.Player) return;
        var sur = window.App.surahs.find(s=>s.id===window.App.actSurahId);
        let vId = sur?.videoId || '';
        
        if (window.App.yt && typeof window.App.yt.destroy === 'function') { 
            try { window.App.yt.destroy(); } catch(e){} 
            window.App.yt = null; 
        }
        
        let pWrap = window.getEl('persistent-player-wrapper');
        if (pWrap) {
            pWrap.innerHTML = '<div id="youtube-player" class="w-full h-full"></div>';
        }

        // Hindari Error 2 jika videoId kosong
        if (!vId) return;

        window.App.yt = new window.YT.Player('youtube-player', {
            host: 'https://www.youtube-nocookie.com', videoId: vId, 
            playerVars: { controls:0, disablekb:1, rel:0, modestbranding:1, playsinline:1 },
            events: {
                onReady: e => { e.target.setPlaybackRate(window.App.speed); },
                onStateChange: e => {
                    if(e.data===window.YT.PlayerState.PLAYING){
                        window.App.isPlay=true;
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-pause text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-100', 'scale-95'); bigBtn.classList.replace('opacity-100', 'opacity-0'); }
                    } else if(e.data===window.YT.PlayerState.PAUSED||e.data===window.YT.PlayerState.ENDED){
                        window.App.isPlay=false;
                        let btn = window.getEl('play-pause-btn'); if(btn) btn.innerHTML = '<i class="ph-fill ph-play text-2xl lg:text-3xl hover:text-emerald-400"></i>';
                        let bigBtn = window.getEl('big-play-btn'); if(bigBtn) { bigBtn.classList.replace('scale-95', 'scale-100'); bigBtn.classList.replace('opacity-0', 'opacity-100'); }
                    }
                },
                onError: e => { window.App.isPlay=false; console.error("YouTube Error", e); }
            }
        });
    };

    window.blobToBase64 = function(blob) { return new Promise((resolve) => { const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(blob); }); };

    window.startStudentRecord = async function() {
        try {
            var stream = await navigator.mediaDevices.getUserMedia({audio: true}); 
            
            let mimeType = '';
            if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4'; 
            else if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
            else if (MediaRecorder.isTypeSupported('audio/webm')) mimeType = 'audio/webm';
            
            var options = mimeType ? { mimeType: mimeType } : {};
            window.App.studentMediaRecorder = new MediaRecorder(stream, options); 
            window.App.studentAudioChunks = [];
            
            window.App.studentMediaRecorder.ondataavailable = e => { if(e.data.size > 0) window.App.studentAudioChunks.push(e.data); };
            window.App.studentMediaRecorder.onstop = async () => { 
                var b = new Blob(window.App.studentAudioChunks, { type: mimeType || 'audio/webm' }); 
                window.App.currentStudentAudioUrl = await window.blobToBase64(b); 
                stream.getTracks().forEach(t => t.stop()); 
                window.render(true); 
            };
            
            window.App.studentMediaRecorder.start(); 
            window.App.rec.is = true; 
            window.App.rec.secs = 0; 
            window.render(true);
            
            window.App.rec.int = setInterval(()=>{ 
                window.App.rec.secs++; 
                let tEl = window.getEl('rec-timer-display');
                if (tEl) {
                    tEl.innerText = window.fmtT(window.App.rec.secs);
                } else {
                    window.render(true);
                }
            }, 1000);
        } catch(e) { window.showAlert("Gagal mengakses mikrofon. Pastikan browser diizinkan merekam suara."); }
    };

    window.stopStudentRecord = function() { if(window.App.studentMediaRecorder && window.App.rec.is) { window.App.studentMediaRecorder.stop(); window.App.rec.is = false; clearInterval(window.App.rec.int); window.render(true); } };

    window.submitRec = async function(type, evt=null) { 
        if(!window.App.hierSel.s) { if(evt) evt.target.value=''; window.showAlert('Pilih identitas santri terlebih dahulu!'); return; }
        
        if (!window.App.resubmitId) {
            let sIdNum = Number(window.App.hierSel.s);
            let segIdNum = window.App.actSegId;
            let hIdNum = Number(window.App.hierSel.h); 
            
            let exists = window.App.subs.some(x => x.siswaId === sIdNum && x.segmentId === segIdNum && x.halaqohId === hIdNum);
            if (exists) {
                if(evt) evt.target.value='';

                return;

        }

        var mediaType = type === 'mic' ? 'rekaman mic' : 'file audio'; var tDate = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); let audioData = window.App.currentStudentAudioUrl;
        if(type === 'file' && evt && evt.target.files[0]) { audioData = await window.blobToBase64(evt.target.files[0]); }
        
        if (window.App.resubmitId) {
            var existingSub = window.App.subs.find(x => x.id === window.App.resubmitId);
            if (existingSub) { 
                existingSub.status = 'pending'; 
                existingSub.type = mediaType; 
                existingSub.date = tDate; 
                existingSub.audioUrl = audioData; 
                existingSub.duration = window.App.rec.secs; 
                if(window.dbSave) window.dbSave('subs', existingSub.id, existingSub); 
            }
            window.App.resubmitId = null;
        } else {
            let nid = Date.now();
            let subData = { 
                id: nid, 
                siswaId: Number(window.App.hierSel.s), 
                halaqohId: Number(window.App.hierSel.h), 
                ustadzId: Number(window.App.hierSel.u), 
                surahId: window.App.actSurahId, 
                segmentId: window.App.actSegId, 
                type: mediaType, 
                date: tDate, 
                status: 'pending', 
                grade: null, 
                note: null, 
                audioUrl: audioData,
                duration: window.App.rec.secs 
            };
            window.App.subs.push(subData);
            if(window.dbSave) window.dbSave('subs', nid, subData);
        }
        window.App.currentStudentAudioUrl = null; if(window.App.rec.is){clearInterval(window.App.rec.int);window.App.rec.is=false;} window.App.rec.secs = 0; window.switchView(window.App.rec.src); window.showAlert('Setoran Berhasil Terkirim ke Cloud!'); 
    };

    window.render = function() {
      let isForced = arguments[0] === true; let activeEl = document.activeElement; let focusedId = activeEl ? activeEl.id : null; let selStart = 0, selEnd = 0;
      
      let sc = window.getEl('main-scroll'); 
      let sPos = sc ? sc.scrollTop : 0;

      if (focusedId && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) { try { selStart = activeEl.selectionStart; selEnd = activeEl.selectionEnd; } catch(e){} }
      if(window.App.theme==='dark') document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
      
      let pWrap = window.getEl('persistent-player-wrapper');
      
      if (window.App.view === 'player' && pWrap && pWrap.parentNode && pWrap.parentNode.id === 'player-destination' && !isForced && !window.App.modal) {
          window.updatePlayerDOM();
      } else {
          if (pWrap) {
              pWrap.classList.add('hidden');
              pWrap.classList.add('pointer-events-none');
              if (pWrap.parentNode !== document.body) {
                  document.body.appendChild(pWrap);
              }
          }
          
          window.getEl('app-root').innerHTML = window.generateMainHtml();
          
          if(window.App.view === 'player') {
              let pDest = window.getEl('player-destination');
              if (pWrap && pDest) {
                  pWrap.classList.remove('hidden', 'pointer-events-none');
                  pWrap.classList.add('absolute', 'inset-0', 'z-0');
                  if (pWrap.parentNode !== pDest) pDest.appendChild(pWrap);
                  if(!window.App.yt) window.initYTPlayer();
              }
              window.updatePlayerDOM();
          }
      }

      let nSc = window.getEl('main-scroll'); 
      if (nSc) nSc.scrollTop = sPos;

      if (focusedId) { let el = document.getElementById(focusedId); if (el) { el.focus(); try { el.setSelectionRange(selStart, selEnd); } catch(e){} } }
      window.renderModal();
    };

    window.generateMainHtml = function() {
